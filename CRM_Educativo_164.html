<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CRM Educativo — Contact Center</title>
<style>
:root{--c1:#4EADF3;--c2:#0070C0;--c3:#002060;--o1:#FF8021;--o2:#FF6600;--o3:#FF3300;--white:#0d1117;--bg:#080c14;--bg2:#0d1520;--card:#0d1520;--border:#1a2a40;--tx:#c9d8f0;--tx2:#5a7899;--tx3:#2a4060;--gn:#00cc66;--gnl:rgba(0,204,102,.1);--rd:#ff3355;--rdl:rgba(255,51,85,.1);--am:#ff9900;--aml:rgba(255,153,0,.1);--fn:'Segoe UI','DM Sans',sans-serif;--mo:'Cascadia Code','DM Mono',monospace;--r:10px;--r2:6px;--r3:20px;--shadow:0 2px 16px rgba(0,0,0,.4);--shadow2:0 4px 32px rgba(78,173,243,.12);--glow:0 0 20px rgba(78,173,243,.15);--glow2:0 0 40px rgba(78,173,243,.25)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--tx);font-size:14px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,112,192,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(78,173,243,.03) 0%,transparent 60%);pointer-events:none;z-index:0}
#login{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,112,192,.2) 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(0,32,96,.3) 0%,transparent 60%),#080c14;display:flex;align-items:center;justify-content:center;z-index:9999}
.lbox{background:rgba(13,21,32,.95);border:1px solid rgba(78,173,243,.2);border-radius:16px;padding:2.5rem 2.25rem;width:380px;box-shadow:var(--shadow2),0 0 60px rgba(78,173,243,.08);backdrop-filter:blur(20px)}
.llogo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.llogo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--c2),rgba(78,173,243,.8));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;box-shadow:0 0 20px rgba(78,173,243,.4)}
.llogo-text{font-size:18px;font-weight:700;color:var(--c1);line-height:1.2;letter-spacing:.04em;text-shadow:0 0 20px rgba(78,173,243,.4)}
.llogo-sub{font-size:11px;color:var(--tx2);font-weight:400}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:10px;color:var(--c2);margin-bottom:.35rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.field input{width:100%;padding:10px 12px;background:rgba(8,12,20,.8);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--tx);font-size:14px;outline:none;font-family:var(--fn);transition:all .2s}
.field input:focus{border-color:var(--c1);background:var(--white)}
.btn-login{width:100%;padding:12px;background:linear-gradient(90deg,var(--c2),var(--c1));border:none;border-radius:var(--r2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fn);transition:opacity .2s}
.btn-login:hover{opacity:.9}
.lerr{color:var(--rd);font-size:12px;margin-top:.5rem;min-height:16px}
.lhint{background:var(--bg);border-radius:var(--r2);padding:.7rem .9rem;font-size:11px;color:var(--tx2);margin-top:1.1rem;line-height:2;border:1px solid var(--border)}
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}
.topbar{background:linear-gradient(90deg,var(--c3),var(--c2));height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;box-shadow:0 2px 8px rgba(0,32,96,.2)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.04em}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.25)}
.tb-section{font-size:12px;color:rgba(255,255,255,.7);font-weight:500}
.tb-right{display:flex;align-items:center;gap:10px}
.rbadge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.04em}
.radm{background:var(--o1);color:#fff}
.ragt{background:var(--gn);color:#fff}
.tb-user{font-size:12px;color:rgba(255,255,255,.85)}
.tb-btn{padding:5px 14px;border-radius:var(--r3);border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:12px;cursor:pointer;font-family:var(--fn);font-weight:600}
.tb-btn:hover{background:rgba(255,255,255,.15)}
.wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--c3);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.1rem .3rem}
.ni{display:flex;align-items:center;gap:10px;padding:10px 1.1rem;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);border-left:3px solid transparent;transition:all .15s;font-weight:500}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.on{background:rgba(78,173,243,.2);color:var(--c1);border-left-color:var(--c1)}
.ni-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nsep{height:1px;background:rgba(255,255,255,.08);margin:.4rem .9rem}
.sb-bottom{margin-top:auto;padding:.75rem;border-top:1px solid rgba(255,255,255,.08)}
.sb-agent-info{background:rgba(78,173,243,.15);border-radius:var(--r2);padding:.6rem .75rem;font-size:11px;color:rgba(255,255,255,.8);line-height:1.7}
.sb-agent-info b{color:var(--c1)}
.main{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
.page{padding:1.5rem}
.phdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.ptitle{font-size:20px;font-weight:700;color:var(--c3)}
.psub{font-size:12px;color:var(--tx2);margin-top:.2rem}
.phdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.sc{background:rgba(13,21,32,.9);border-radius:var(--r2);padding:.55rem .85rem;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.sc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.sc-blue::before{background:var(--c2)}.sc-teal::before{background:var(--c1)}.sc-orange::before{background:var(--o1)}.sc-green::before{background:var(--gn)}.sc-red::before{background:var(--rd)}.sc-dark::before{background:var(--c3)}
.sn{font-size:18px;font-weight:700;color:var(--c1);text-shadow:0 0 16px rgba(78,173,243,.4)}.sl{font-size:11px;color:var(--tx2);margin-top:3px;font-weight:500}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.9rem;align-items:center}
.frow input,.frow select{padding:8px 11px;background:rgba(8,12,20,.8);border:1.5px solid var(--border);border-radius:var(--r3);color:var(--tx);font-size:13px;font-family:var(--fn);outline:none;transition:all .2s}
.frow input:focus,.frow select:focus{border-color:var(--c1)}
.frow input{min-width:200px;flex:1}
.bpri{padding:8px 16px;background:linear-gradient(90deg,var(--c2),var(--c1));border:none;border-radius:var(--r3);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);white-space:nowrap;transition:opacity .2s}
.bpri:hover{opacity:.88}
.bout{padding:7px 14px;background:var(--white);border:1.5px solid var(--c2);border-radius:var(--r3);color:var(--c2);font-size:13px;cursor:pointer;font-family:var(--fn);white-space:nowrap;font-weight:600}
.bout:hover{background:var(--bg2)}
.bdanger{padding:7px 14px;background:var(--white);border:1.5px solid var(--rd);border-radius:var(--r3);color:var(--rd);font-size:13px;cursor:pointer;font-family:var(--fn);font-weight:600}
.bsm{padding:4px 12px;border-radius:var(--r3);border:1px solid var(--border);background:var(--white);color:var(--tx2);font-size:12px;cursor:pointer;font-family:var(--fn);transition:all .15s;font-weight:500}
.bsm:hover{border-color:var(--c1);color:var(--c2)}
.bact{padding:6px 14px;background:var(--o1);border:none;border-radius:var(--r3);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.twrap{background:rgba(13,21,32,.9);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;backdrop-filter:blur(8px)}
.tinfo{padding:10px 1rem;font-size:12px;color:var(--tx2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--c3);padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid var(--c2);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:var(--c2)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(78,173,243,.06)}
tbody td{padding:9px 12px;color:var(--tx);vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mat{font-family:var(--mo);font-size:12px;color:var(--tx2)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
.bnew{background:#E3F2FF;color:var(--c2)}.bcert{background:#EDE7FF;color:#4B0082}.bsig{background:var(--gnl);color:var(--gn)}.brep{background:var(--aml);color:var(--am)}.bact{background:var(--bg2);color:var(--tx2)}.bins{background:#E3F2FF;color:var(--c2)}.begr{background:var(--bg2);color:var(--tx3)}
.btip-win{background:var(--gnl);color:var(--gn)}.btip-pend{background:var(--aml);color:var(--am)}.btip-call{background:#E3F2FF;color:var(--c2)}.btip-no{background:var(--rdl);color:var(--rd)}.btip-na{background:var(--bg2);color:var(--tx2)}
.cok{color:var(--gn);font-weight:700}.cbad{color:var(--rd);font-weight:700}
.pill-zona{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700}
.stitle{font-size:13px;font-weight:700;color:var(--c3);padding:10px 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg2)}
.stitle span{font-size:11px;color:var(--tx2);font-weight:500}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,280px));gap:12px;justify-content:center;justify-items:stretch}
.ucard{background:rgba(13,21,32,.9);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:1rem;transition:border .2s}.ucard:hover{border-color:rgba(78,173,243,.3)}
.ucrd2{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:1rem}
.ficha{display:none}
.ficha-main{display:flex;flex-direction:column;min-height:calc(100vh - 56px);background:var(--bg)}
.ficha-header{background:linear-gradient(135deg,var(--c3),var(--c2));padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem}
.ficha-name{font-size:20px;font-weight:700;color:#fff}
.ficha-mat{font-size:12px;color:rgba(255,255,255,.7);font-family:var(--mo);margin-top:2px}
.ficha-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:.5rem}
.ficha-body{display:flex;overflow:hidden;height:calc(100vh - 64px - 85px)}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.ficha-field{background:rgba(8,12,20,.6);border:1px solid rgba(78,173,243,.12);border-radius:var(--r2);padding:.65rem .85rem;transition:border .2s}.ficha-field:hover{border-color:rgba(78,173,243,.3)}
.ficha-label{font-size:9px;font-weight:700;color:var(--c2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.3rem}
.ficha-value{font-size:13px;color:var(--tx);font-weight:500}
.ficha-section{font-size:11px;font-weight:700;color:var(--c2);letter-spacing:.06em;text-transform:uppercase;margin:.9rem 0 .5rem;padding-bottom:.35rem;border-bottom:2px solid var(--c1)}
.tip-form{background:rgba(13,21,32,.8);border-radius:var(--r2);padding:.75rem;border:1px solid rgba(78,173,243,.12)}
.tip-select{width:100%;padding:10px 12px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--tx);font-size:14px;font-family:var(--fn);outline:none;font-weight:600}
.fg{margin-bottom:.9rem}
.fg label{display:block;font-size:12px;color:var(--tx2);margin-bottom:.35rem;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;background:rgba(8,12,20,.8);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--tx);font-size:13px;font-family:var(--fn);outline:none;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--c1);box-shadow:0 0 0 2px rgba(78,173,243,.1)}
.fg textarea{resize:vertical;min-height:80px}
.tip-info{font-size:11px;color:var(--tx2);background:var(--white);border-radius:var(--r2);padding:.5rem .75rem;border-left:3px solid var(--c1);margin-top:.4rem}
.modal{position:fixed;inset:0;background:rgba(0,32,96,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal.on{display:flex}
.mbox{background:rgba(13,21,32,.97);border:1px solid rgba(78,173,243,.2);border-radius:var(--r);box-shadow:var(--shadow2),0 0 40px rgba(78,173,243,.1);width:540px;max-height:90vh;overflow-y:auto;backdrop-filter:blur(20px)}
.mhdr{background:linear-gradient(90deg,var(--c3),var(--c2));padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;border-radius:var(--r) var(--r) 0 0}
.mhdr-title{font-size:15px;font-weight:700;color:#fff}
.mclose{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mbody{padding:1.25rem;max-height:65vh;overflow-y:auto}
.alert-bar{position:fixed;top:70px;right:1.5rem;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:320px}
.alert-item{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow2);border:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:flex-start;gap:.6rem;pointer-events:all;cursor:pointer;animation:slideIn .3s ease;border-left:4px solid var(--o3)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.alert-ico{font-size:20px;flex-shrink:0}
.alert-title{font-size:13px;font-weight:700;color:var(--c3)}
.alert-body{font-size:12px;color:var(--tx2);margin-top:2px}
.notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--c3);color:#fff;border-radius:var(--r);padding:.75rem 1.1rem;font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;max-width:340px;pointer-events:none;box-shadow:var(--shadow2)}
.notif.on{opacity:1;transform:translateY(0);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.notif.ok{background:var(--gn)}.notif.err{background:var(--rd)}.notif.warn{background:var(--o2)}
.drawer{position:fixed;right:0;top:64px;bottom:0;width:600px;background:rgba(8,12,20,.97);border-left:1px solid rgba(78,173,243,.15);z-index:500;transform:translateX(100%);transition:transform .2s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column;box-shadow:-4px 0 40px rgba(78,173,243,.1);backdrop-filter:blur(20px)}
.drawer.on{transform:translateX(0)}
.dclose{display:none}
.empty{text-align:center;padding:3rem;color:var(--tx3);font-size:13px;letter-spacing:.04em}
.empty-ico{font-size:40px;margin-bottom:.5rem}
.divd{border:none;border-top:1px solid var(--border);margin:.9rem 0}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:var(--bg2);color:var(--tx2);margin-right:3px}
.tag-cur{background:#E3F2FF;color:var(--c2)}
.tag-more{background:var(--bg2);color:var(--tx3)}
.cklist{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px;background:rgba(0,15,40,.4)}
.cki{display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:12px;cursor:pointer;border-radius:6px;color:var(--tx);transition:background .12s}.cki:hover{background:rgba(78,173,243,.08)}.cki input[type=checkbox]{width:14px;height:14px;flex-shrink:0;cursor:pointer;accent-color:var(--c2)}
.cki:hover{background:rgba(78,173,243,.08)}
.cki input{accent-color:var(--c2)}
.progress-bar{height:6px;background:rgba(78,173,243,.08);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c1));border-radius:4px}
.pz-bajio{background:#E3F2FF;color:var(--c2)}.pz-centro{background:#E8F5E9;color:#1B5E20}.pz-norte{background:#FFF3E0;color:var(--o2)}.pz-corbuse{background:#EDE7F6;color:#4527A0}.pz-sur{background:#FCE4EC;color:#880E4F}.pz-on{background:#E0F7FA;color:#006064}
.oferta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:1rem}
.oferta-card{background:rgba(13,21,32,.9);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:.85rem 1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.oferta-card:hover{box-shadow:var(--glow2);border-color:var(--c1);transform:translateY(-2px)}
.oferta-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--c2),var(--c1))}
.oc-icon{font-size:28px;margin-bottom:.5rem}
.oc-nombre{font-size:13px;font-weight:700;color:var(--c1);margin-bottom:.2rem;line-height:1.3}
.oc-total{font-size:12px;color:var(--tx2);margin-bottom:.65rem}
.oc-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:.5rem}
.oc-fill{height:100%;background:linear-gradient(90deg,var(--c2),var(--c1));border-radius:3px;transition:width .4s;box-shadow:0 0 8px rgba(78,173,243,.4)}
.oc-stats{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:.5rem}
.oc-cta{font-size:11px;color:var(--c2);font-weight:700;text-align:right}
.sec-lbl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.65rem;margin-top:.5rem}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--c1)}
/* ── CIBERPUNK EXTRA ── */
@keyframes chatPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.ficha-col-datos,.ficha-col-gestion{overflow-y:auto;overflow-x:hidden}
.ficha-col-datos .ficha-section:first-child,.ficha-col-gestion .ficha-section:first-child{margin-top:0}
/* Scrollbar delgada en columnas de ficha */
.ficha-body *::-webkit-scrollbar{width:3px}
.ficha-body *::-webkit-scrollbar-track{background:transparent}
.ficha-body *::-webkit-scrollbar-thumb{background:rgba(78,173,243,.2);border-radius:2px}
.page{position:relative;z-index:1}
thead th{background:rgba(0,32,96,.6);backdrop-filter:blur(8px)}
.sb-agent-info{background:rgba(78,173,243,.08);border:1px solid rgba(78,173,243,.15);border-radius:var(--r2)}
.stitle{background:rgba(8,12,20,.5);color:var(--c1)}
.badge{font-family:var(--mo)}
.bnew,.bins{background:rgba(78,173,243,.12);color:var(--c1)}
.bsig{background:rgba(0,204,102,.12);color:var(--gn)}
.brep{background:rgba(255,153,0,.12);color:var(--am)}
.btip-call{background:rgba(78,173,243,.12);color:var(--c1)}
.btip-no{background:rgba(255,51,85,.12);color:var(--rd)}
.btip-na{background:rgba(90,120,153,.12);color:var(--tx2)}
.bcert{background:rgba(160,100,255,.12);color:#a064ff}
.bact{background:rgba(42,64,96,.4);color:var(--tx2)}

}

// ── Sincronización inicial al cargar ──
// ════════════════════════════════════════════════════════
// DB CHUNKS — Subir y descargar base via Firestore
// ════════════════════════════════════════════════════════

var DB_CHUNK_SIZE = 3500; // filas por chunk (800KB por doc)
var DB_UPLOAD_IN_PROGRESS = false;

// ── Subir DB a Firestore en chunks (solo admin) ──
async function fbUploadDB(){
  if(!FB_ONLINE){ notif('Firebase no disponible','err'); return; }
  var rows = all();
  if(!rows.length){ notif('No hay datos para subir','err'); return; }
  if(DB_UPLOAD_IN_PROGRESS){ notif('Subida ya en progreso...','err'); return; }
  DB_UPLOAD_IN_PROGRESS = true;

  var totalChunks = Math.ceil(rows.length / DB_CHUNK_SIZE);
  var ts = Date.now();

  // Actualizar botón con progreso
  function updateBtn(pct, msg){
    var btn = document.querySelector('[onclick="fbUploadDB()"]');
    if(btn) btn.textContent = msg || ('☁ Subiendo... '+pct+'%');
    // Actualizar indicador Firebase en topbar
    var fbEl = document.getElementById('fb-status');
    if(fbEl) fbEl.textContent = msg || ('↑ '+pct+'%');
  }

  updateBtn(0, '☁ Preparando...');
  notif('Iniciando subida: '+fmt(rows.length)+' prospectos en '+totalChunks+' partes', 'ok');

  try{
    // Metadata
    await db.collection('db_chunks').doc('meta').set({
      total: totalChunks, rows: rows.length, ts: ts, version: ts
    });

    // Subir en lotes de 4 chunks en paralelo
    var PARALLEL = 4;
    for(var i = 0; i < totalChunks; i += PARALLEL){
      var batch = [];
      for(var j = i; j < Math.min(i+PARALLEL, totalChunks); j++){
        var chunk = rows.slice(j * DB_CHUNK_SIZE, (j+1) * DB_CHUNK_SIZE);
        var compact = chunk.map(function(r){
          return [r.m, r.tp||'I', r.n||'', r.c||'', r.p||'', r.pl||'',
                  r.t||'', r.e||'', r.mod||'', r.oi||'',
                  (r.cur&&r.cur.length?r.cur.join('|'):'')];
        });
        batch.push(
          db.collection('db_chunks').doc('chunk_'+String(j).padStart(4,'0')).set({
            rows: compact, idx: j, ts: ts
          })
        );
      }
      await Promise.all(batch);
      var pct = Math.round((Math.min(i+PARALLEL, totalChunks)/totalChunks)*100);
      updateBtn(pct);
    }

    // Éxito
    var btn = document.querySelector('[onclick="fbUploadDB()"]');
    if(btn) btn.textContent = '✓ Base en Firebase';
    setSt('✓ Base subida', true);
    notif('✓ Base subida: '+fmt(rows.length)+' prospectos en '+totalChunks+' chunks', 'ok');
    // Refrescar página para mostrar estado actualizado
    setTimeout(function(){ pgCatalogos(document.getElementById('main')); }, 1500);

  }catch(e){
    console.error('[FB] Upload error:', e);
    var btn2 = document.querySelector('[onclick="fbUploadDB()"]');
    if(btn2) btn2.textContent = '☁ Subir base a Firebase';
    notif('Error al subir: ' + e.message, 'err');
  }
  DB_UPLOAD_IN_PROGRESS = false;
}

// ── Descargar DB desde Firestore (todos los roles) ──
async function fbDownloadDB(onProgress){
  if(!FB_ONLINE) return false;
  try{
    // Verificar si hay base disponible
    var metaDoc = await db.collection('db_chunks').doc('meta').get();
    if(!metaDoc.exists){ 
      console.log('[FB] No hay base en Firebase');
      return false; 
    }
    var meta = metaDoc.data();
    var totalChunks = meta.total || 0;
    if(!totalChunks) return false;

    // Verificar si ya tenemos la misma versión en memoria
    if(DB._fbVersion && DB._fbVersion === meta.version && all().length > 0){
      console.log('[FB] DB ya actualizada (version ' + meta.version + ')');
      return true;
    }

    console.log('[FB] Descargando base: '+totalChunks+' chunks...');
    if(onProgress) onProgress(0, totalChunks);

    var allRows = [];
    // Descargar chunks en paralelo (lotes de 5)
    for(var i = 0; i < totalChunks; i += 5){
      var batch = [];
      for(var j = i; j < Math.min(i+5, totalChunks); j++){
        batch.push(db.collection('db_chunks').doc('chunk_'+String(j).padStart(4,'0')).get());
      }
      var docs = await Promise.all(batch);
      docs.forEach(function(doc){
        if(!doc.exists) return;
        var rows = doc.data().rows || [];
        rows.forEach(function(r){
          // Descompactar
          allRows.push({
            m:r[0], tp:r[1], n:r[2], c:r[3], p:r[4], pl:r[5],
            t:r[6], e:r[7], mod:r[8], oi:r[9],
            cur:(r[10]?r[10].split('|'):[])
          });
        });
      });
      if(onProgress) onProgress(Math.min(i+5, totalChunks), totalChunks);
    }

    // Separar inscritos y egresados
    DB.ins = allRows.filter(function(r){ return r.tp === 'I'; });
    DB.egr = allRows.filter(function(r){ return r.tp === 'E'; });
    DB._fbVersion = meta.version;

    console.log('[FB] DB descargada: '+fmt(allRows.length)+' prospectos');
    return true;
  }catch(e){
    console.error('[FB] Download error:', e);
    return false;
  }
}

async function fbInitSync(){
  if(_esFileProtocol){
    console.log('[CRM] Modo local file:// — Firebase desactivado. Usa un servidor HTTP para sync.');
    return;
  }
  if(!FB_ONLINE){
    console.log('[CRM] Modo offline — usando localStorage');
    return;
  }
  console.log('[CRM] Sincronizando con Firebase...');
  // Mostrar indicador de sync en el topbar
  var fbEl=document.getElementById('fb-status');
  if(fbEl){fbEl.textContent='⟳ Sincronizando...';fbEl.style.color='var(--o1)';}
  try{
    // 1. Usuarios — siempre desde Firebase (fuente de verdad)
    var fbUsers = await fbLoadUsers();
    if(fbUsers && Object.keys(fbUsers).length){
      Object.assign(EXTRA, fbUsers);
      try{localStorage.setItem('crm_users',JSON.stringify(EXTRA));}catch(e){}
      console.log('[CRM] Usuarios:', Object.keys(fbUsers).length);
    }
    // 2. Asignaciones
    var fbAsgn = await fbLoadAsgn();
    if(fbAsgn && Object.keys(fbAsgn).length){
      Object.assign(ASGN, fbAsgn);
      try{localStorage.setItem('crm_asgn',JSON.stringify(ASGN));}catch(e){}
      console.log('[CRM] Asignaciones:', Object.keys(fbAsgn).length);
    }
    // 3. Grupos
    var fbGrupos = await fbLoadGrupos();
    if(fbGrupos && Object.keys(fbGrupos).length){
      Object.assign(GRUPOS, fbGrupos);
      try{localStorage.setItem('crm_grupos',JSON.stringify(GRUPOS));}catch(e){}
      console.log('[CRM] Grupos:', Object.keys(fbGrupos).length);
    }
    // 4. PS — SIEMPRE desde Firebase cuando está disponible
    // Firebase es la fuente de verdad para gestiones
    var fbPS = await fbLoadPS();
    if(fbPS && Object.keys(fbPS).length){
      // Reemplazar PS completo con datos de Firebase
      Object.keys(fbPS).forEach(function(mat){
        if(!PS[mat]) PS[mat]={};
        Object.assign(PS[mat], fbPS[mat]);
      });
      // Guardar en localStorage como caché (sin bloquear si falla)
      try{
        var serialized=JSON.stringify(PS);
        if(serialized.length < 4500000){ // solo si < 4.5MB
          localStorage.setItem('crm_ps', serialized);
        } else {
          console.warn('[CRM] PS > 4.5MB — omitiendo localStorage, usando solo Firebase');
          localStorage.removeItem('crm_ps'); // limpiar caché vieja
        }
      }catch(e){
        console.warn('[CRM] localStorage lleno — PS solo en Firebase');
        localStorage.removeItem('crm_ps');
      }
      console.log('[CRM] Gestiones Firebase:', Object.keys(fbPS).length);
    }
    // Listener usuarios en tiempo real (sync multi-dispositivo)
    db.collection('usuarios').onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'||change.type==='modified'){
          EXTRA[change.doc.id]=change.doc.data();

        if(change.type==='removed') delete EXTRA[change.doc.id];

      if(pUsuarios&&pUsuarios.classList.contains('on'))

    },function(e){console.warn('[FB] usuarios listener:',e.message);});

    // Listener asignaciones en tiempo real
    db.collection('asignaciones').onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'||change.type==='modified')
          ASGN[change.doc.id]=change.doc.data();
        if(change.type==='removed') delete ASGN[change.doc.id];
      });
      try{localStorage.setItem('crm_asgn',JSON.stringify(ASGN));}catch(e){}
    },function(e){console.warn('[FB] asgn listener:',e.message);});

    // Listener grupos en tiempo real
    db.collection('grupos').onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'||change.type==='modified')
          GRUPOS[change.doc.id]=change.doc.data();
        if(change.type==='removed') delete GRUPOS[change.doc.id];
      });
      try{localStorage.setItem('crm_grupos',JSON.stringify(GRUPOS));}catch(e){}
    },function(e){console.warn('[FB] grupos listener:',e.message);});

    // Listener gestiones (PS) en tiempo real
    db.collection('gestiones').onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'||change.type==='modified'){
          var d=change.doc.data();
          if(!PS[d.mat]) PS[d.mat]={};
          PS[d.mat][d.producto]=d;
        }
      });
      psSync();

    // Activar listeners en tiempo real

           document.getElementById('ni-monitoreo').classList.contains('on')){

    // Actualizar indicador Firebase
    if(fbEl){
      fbEl.textContent='● Firebase';

      fbEl.style.background='rgba(0,204,102,.15)';
      fbEl.style.border='1px solid rgba(0,204,102,.3)';

    if(fbEl){
      fbEl.textContent='● Firebase (error)';
      fbEl.style.color='var(--rd)';
    }
    // No mostrar error al usuario — el sistema sigue funcionando con localStorage
    console.warn('[CRM] Usando localStorage como fallback');
  }
}

function psSync(){
  try{
    var limite=Date.now()-(30*24*3600*1000);
    var psC={};
    Object.keys(PS).forEach(function(mat){
      var prods=PS[mat]; var comp={};
      Object.keys(prods).forEach(function(prod){
        var s=prods[prod];
        var esTerminal=s.estado==='descartado'||s.estado==='cerrado_producto';
        var esAntiguo=s.ts&&s.ts<limite;
        if(!(esTerminal&&esAntiguo)) comp[prod]=s;
      });
      if(Object.keys(comp).length) psC[mat]=comp;
    });
    var ser=JSON.stringify(psC);
    localStorage.setItem('crm_ps',ser);
    if(ser.length>3145728)
      console.warn('[CRM] PS > 3MB ('+Math.round(ser.length/1024)+'KB)');
  }catch(e){
    if(e.name==='QuotaExceededError'){
      console.error('[CRM] localStorage lleno — purgando...');
      Object.keys(PS).forEach(function(mat){
        Object.keys(PS[mat]).forEach(function(prod){
          var s=PS[mat][prod];
          if(s.estado==='descartado'||s.estado==='cerrado_producto') delete PS[mat][prod];
        });
        if(!Object.keys(PS[mat]).length) delete PS[mat];
      });
      try{localStorage.setItem('crm_ps',JSON.stringify(PS));}catch(e2){}
      notif('⚠ Almacenamiento casi lleno','err');
    }
  }
}

function setPS(mat,prod,obj){
  if(!PS[mat]) PS[mat]={};
  PS[mat][prod]=Object.assign(getPS(mat,prod),obj);
  // Caché local (si cabe)
  try{
    var ser=JSON.stringify(PS);
    if(ser.length<4500000) localStorage.setItem('crm_ps',ser);
  }catch(e){}
  // Firebase — fuente de verdad con retry automático
  if(FB_ONLINE){
    fbSavePS(mat,prod,PS[mat][prod]).catch(function(err){
      console.warn('[CRM] Reintentando guardar gestión...');
      setTimeout(function(){
        fbSavePS(mat,prod,PS[mat][prod]).catch(function(e2){
          console.error('[CRM] Error al guardar gestión:',e2.message);
          notif('⚠ Error al guardar — verifica tu conexión','err');
        });
      },3000);
    });
  }
}

var _bc=null;
try{_bc=new BroadcastChannel('crm_edu_sync');}catch(e){}
if(_bc) _bc.onmessage=function(ev){
  var msg=ev.data||{};
  switch(msg.type){
    case 'db_update':
      if(msg.ins) DB.ins=msg.ins;
      if(msg.egr) DB.egr=msg.egr;
      if(CU&&CU.role==='agent') refreshState();
      break;
    case 'ps_update':
      if(msg.ps) Object.assign(PS,msg.ps);
      break;
    case 'agent_login':
      if(msg.user){ AGENTE_STATUS[msg.user]=AGENTE_STATUS[msg.user]||{};
        Object.assign(AGENTE_STATUS[msg.user],{estado:'sin_base',desde:msg.ts,
          ficha:null,tipHoy:0,ventasHoy:0,name:msg.name,campus:msg.campus,zona:msg.zona}); }
      break;
    case 'agent_logout':
      if(msg.user&&AGENTE_STATUS[msg.user]) AGENTE_STATUS[msg.user].estado='desconectado';
      break;
    case 'agent_status':
      if(msg.user&&msg.status){ AGENTE_STATUS[msg.user]=AGENTE_STATUS[msg.user]||{};
        Object.assign(AGENTE_STATUS[msg.user],msg.status); }
      break;
    case 'chat_msg':
      if(msg.msg) CHAT_MSG.push(msg.msg);
      _notifChat(msg.msg);
      break;
    case 'grupos_update':
      if(msg.grupos) Object.assign(GRUPOS,msg.grupos);
      break;
    case 'role_change':
      if(msg.user&&msg.user===CU.username){
        notif('Tu rol fue modificado por el administrador. Cerrando sesión...','err');
        setTimeout(function(){doLogout();},2000);
      }
      break;
    case 'pend_update':
      break;
  }
};

function startSyncPolling(){
  // Polling ligero — verificar actualizaciones en localStorage
  setInterval(function(){
    if(!CU) return;
    try{

      if(ts&&parseInt(ts)>(_lastDbTs||0)){

function doLogin(){
  var u=document.getElementById('lu').value.trim();
  var p=document.getElementById('lp').value;
  // Verificar integridad de localStorage al inicio
  try{
    var psRaw=localStorage.getItem('crm_ps');
    if(psRaw){
      var psSize=psRaw.length;
      if(psSize>4000000){ // >4MB
        console.warn('[CRM] PS grande en localStorage: '+Math.round(psSize/1024)+'KB');
      }
    }
  }catch(e){}
  document.getElementById('lerr').textContent='';
  if(!u||!p){document.getElementById('lerr').textContent='Completa los campos';return;}
  // Cargar usuarios del localStorage ANTES de validar
  try{
    var stu=localStorage.getItem('crm_users');
    if(stu){var eu=JSON.parse(stu);Object.keys(eu).forEach(function(k){EXTRA[k]=eu[k];});}
  }catch(e){}
  var ud=getU(u);
  if(!ud){
    // Usuario no encontrado localmente — intentar cargar desde Firebase
    if(FB_ONLINE){
      document.getElementById('lerr').textContent='Verificando...';
      db.collection('usuarios').doc(u).get().then(function(doc){
        if(doc.exists){
          EXTRA[u]=doc.data();
          try{localStorage.setItem('crm_users',JSON.stringify(EXTRA));}catch(e){}
          doLogin(); // reintentar con el usuario ya cargado
        } else {
          document.getElementById('lerr').textContent='Usuario no encontrado';
        }
      }).catch(function(){
        document.getElementById('lerr').textContent='Usuario no encontrado';
      });
    } else {
      document.getElementById('lerr').textContent='Usuario no encontrado';
    }
    return;
  }
  // Verificar contraseña — soporte para hash SHA-256 y texto plano (legacy)
  var storedPass=ud.pass||'';
  var isHashed=storedPass.length===64&&/^[a-f0-9]+$/.test(storedPass);
  if(isHashed){
    // Contraseña hasheada — comparar con SHA-256 de la entrada
    crypto.subtle.digest('SHA-256',new TextEncoder().encode(p))
      .then(function(buf){
        var hash=Array.from(new Uint8Array(buf))
          .map(function(b){return b.toString(16).padStart(2,'0');}).join('');
        if(hash===storedPass){
          _continuarLogin(ud,u);
        } else {
          document.getElementById('lerr').textContent='Contraseña incorrecta';
        }
      });
    return; // esperar resultado async
  }
  // Fallback: texto plano (EXTRA legacy)
  if(storedPass!==p){document.getElementById('lerr').textContent='Contraseña incorrecta';return;}
  _continuarLogin(ud,u);
}

function _continuarLogin(ud,u){
  // Cargar ASGN actualizado
  try{
    var sta=localStorage.getItem('crm_asgn');
    if(sta){var ea=JSON.parse(sta);Object.keys(ea).forEach(function(k){ASGN[k]=ea[k];});}
  }catch(e){}
  CU={username:u,role:ud.role,name:ud.name,campus:ud.campus||[],zona:ud.zona||''};
  // ── Restaurar DB SIEMPRE al login (no importa si ya hay datos en memoria) ──
  try{
    var sdb=localStorage.getItem('crm_db');
    if(sdb){
      var d=JSON.parse(sdb);
      if(d.ins&&d.ins.length){ DB.ins=d.ins; }
      if(d.egr&&d.egr.length){ DB.egr=d.egr; }
      window._colas={};
      console.log('[CRM] DB cargada al login: ins='+DB.ins.length+', egr='+DB.egr.length);
    }
  }catch(e){ console.error('[CRM] Error cargando DB en login:',e); }
  // ── Cargar PS y PENDPAGO ──
  psLoad();
  try{
    var sp=localStorage.getItem('crm_pend');
    if(sp){
      var remPend=JSON.parse(sp);
      // Merge: agregar entradas que no existan localmente
      remPend.forEach(function(rp){
        var ex=PENDPAGO.findIndex(function(x){return x.mat===rp.mat&&x.producto===rp.producto&&x.agente===rp.agente;});
        if(ex>=0) PENDPAGO[ex]=rp; else PENDPAGO.push(rp);
      });
    }
  }catch(e){}
  // ── Mostrar UI ──
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  var roleLbl=ud.role==='admin'?'ADMINISTRADOR':ud.role==='supervisor'?'SUPERVISOR':'AGENTE';
  var roleCls=ud.role==='admin'?'radm':ud.role==='supervisor'?'rsup':'ragt';
  document.getElementById('rbadge').textContent=roleLbl;
  document.getElementById('rbadge').className='rbadge '+roleCls;
  document.getElementById('uinfo').textContent=ud.name;
  buildSidebar();
  // Firebase sync + banner file://
  setTimeout(function(){
    fbInitSync();
    if(_esFileProtocol&&(CU.role==='admin'||CU.role==='supervisor')){
      if(!document.getElementById('file-banner')){
        var b=document.createElement('div');
        b.id='file-banner';
        b.style.cssText='position:fixed;top:56px;left:0;right:0;z-index:9000;'
          +'background:rgba(255,128,33,.97);color:#fff;font-size:12px;font-weight:600;'
          +'padding:8px 16px;display:flex;justify-content:space-between;align-items:center';
        b.innerHTML='⚠ Modo local — Firebase no funciona en file://. '
          +'Para sync multi-dispositivo sirve el archivo desde un servidor HTTP. '
          +'<button onclick="this.parentElement.remove()" '
          +'style="background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff;'
          +'border-radius:4px;padding:2px 10px;cursor:pointer;font-size:11px;margin-left:12px">Entendido</button>';
        document.body.appendChild(b);
      }
    }
    // Estado inicial agente en Firebase
    if(CU.role==='agent'){
      AGENTE_STATUS[CU.username]={estado:'sin_base',desde:Date.now(),
        ficha:null,tipHoy:0,ventasHoy:0,name:CU.name,campus:CU.campus,zona:CU.zona};
      iniciarTimer('noProductivo');
      bcSend({type:'agent_login',user:CU.username,name:CU.name,campus:CU.campus,zona:CU.zona,ts:Date.now()});
      fbUpdateAgenteEstado(CU.username,{estado:'sin_base',desde:Date.now(),
        ficha:null,tipHoy:0,ventasHoy:0,name:CU.name,campus:CU.campus,zona:CU.zona}).catch(function(){});
    }
  }, 600);
  goPage(ud.role==='admin'?'dashboard':ud.role==='supervisor'?'dashboard':'mi-base');
  if(ud.role==='agent') startCallbackTimer();
  startHeartbeat();
  startSyncPolling();
}

function pgDashOp(M){
  if(CU.role!=='admin'){notif('Acceso no autorizado','err');return;}

  // ── Filtros compartidos con Resumen Base ──
  var _fZ   = window._dFZ   || '';
  var _fC   = window._dFC   || '';
  var _fOf  = window._dFOf  || '';
  var _fNiv = window._dFNiv || '';
  var _fCur = window._dFCur || '';

  var dAll = all();
  // Supervisor: solo campus de sus agentes
  if(CU.role==='supervisor'){
    var _grpSup3=Object.values(GRUPOS).find(function(g){return g.supervisor===CU.username;});
    var _campusSup3=new Set();
    if(_grpSup3&&_grpSup3.agentes){
      _grpSup3.agentes.forEach(function(u){
        var ud=allU()[u]; if(ud&&ud.campus) ud.campus.forEach(function(cp){_campusSup3.add(cp);});
      });
    }
    if(_campusSup3.size) dAll=dAll.filter(function(r){return _campusSup3.has(r.c);});
  }
  if(!dAll.length){
    M.innerHTML='<div class="page"><div class="twrap"><div class="empty">'
      +'<div style="font-size:2rem;margin-bottom:.5rem">📂</div>'
      +'Base vacía — carga los CSV en Actualizar Datos</div></div></div>';
    return;
  }

  // ── Aplicar filtros ──
  var d = dAll.filter(function(r){
    if(_fZ  && (CAMPUS_ZONA[r.c]||'Otra')!==_fZ)  return false;
    if(_fC  && r.c!==_fC)                           return false;
    if(_fOf==='idioma')  { if(!r.oi||r.oi==='Certificación') return false; }
    else if(_fOf==='certif')  { if(r.oi!=='Certificación') return false; }
    else if(_fOf==='cursos')  { if(!r.cur||!r.cur.length)  return false; }
    if(_fNiv && r.oi!==_fNiv)  return false;
    if(_fCur && (!r.cur||r.cur.indexOf(_fCur)<0)) return false;
    return true;
  });

  var hayFiltro = _fZ||_fC||_fOf||_fNiv||_fCur;
  var total = d.length || 1;

  // ── Métricas operativas ──
  var ganados=0,pendPago=0,callbacks=0,enSeguim=0,cancelados=0,libres=0;
  var agentStats={};
  var _misAgt=null;
  if(CU.role==='supervisor'){
    var _grpSup=Object.values(GRUPOS).find(function(g){return g.supervisor===CU.username;});
    _misAgt=_grpSup?_grpSup.agentes:[];
  }
  Object.entries(allU()).forEach(function(e){
    var u=e[0],ud=e[1];
    if(ud.role!=='agent') return;
    if(_misAgt&&_misAgt.indexOf(u)<0) return; // supervisor: solo sus agentes
    agentStats[u]={name:ud.name,gano:0,pend:0,gest:0,canc:0,cb:0,total:0};

function openNuevoGrupo(editId){
  var g=editId&&GRUPOS[editId]?GRUPOS[editId]:{nombre:'',supervisor:'',agentes:[],campus:[]};
  var supervisores=Object.entries(allU()).filter(function(e){return e[1].role==='supervisor';});
  var agentes=Object.entries(allU()).filter(function(e){return e[1].role==='agent';});

  var supOpts=supervisores.map(function(e){
    return '<option value="'+e[0]+'"'+(g.supervisor===e[0]?' selected':'')+'>'+e[1].name+' ('+e[0]+')</option>';
  }).join('');

  var agtChks=agentes.map(function(e){
    var sel=g.agentes&&g.agentes.indexOf(e[0])>=0;
    return '<label class="cki"><input type="checkbox" name="ng-agt" value="'+e[0]+'"'+(sel?' checked':'')+'> '+e[1].name+'</label>';
  }).join('');

  openModal('<b>'+(editId?'Editar':'Nuevo')+' Grupo</b>',
    '<div class="fg"><label>NOMBRE DEL GRUPO</label>'
      +'<input type="text" id="ng-nombre" value="'+g.nombre+'" placeholder="Ej: Equipo Bajío"></div>'
    +'<div class="fg"><label>SUPERVISOR</label>'
      +'<select id="ng-sup"><option value="">Sin supervisor</option>'+supOpts+'</select></div>'
    +(agtChks?'<div class="fg"><label>AGENTES</label><div class="cklist">'+agtChks+'</div></div>'
      :'<div style="font-size:12px;color:var(--tx3);padding:.5rem">Crea agentes primero</div>')
    +'<div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem">'
      +'<button class="bout" onclick="closeModal()">Cancelar</button>'
      +'<button class="bpri" onclick="saveGrupoForm(\''+editId+'\')">Guardar</button>'
    +'</div>'
  );
}

function saveGrupoForm(editId){
  var nombre=document.getElementById('ng-nombre').value.trim();
  var sup=document.getElementById('ng-sup').value;
  var agts=Array.from(document.querySelectorAll('[name=ng-agt]:checked')).map(function(el){return el.value;});
  if(!nombre){notif('El nombre del grupo es obligatorio','err');return;}
  var gid=editId||('grp_'+Date.now());
  GRUPOS[gid]={nombre:nombre,supervisor:sup,agentes:agts,campus:[]};
  saveGRUPOS();
  bcSend({type:'grupos_update',grupos:GRUPOS});
  closeModal();
  notif('Grupo guardado','ok');
  pgGrupos(document.getElementById('main'));
}

function editGrupo(gid){openNuevoGrupo(gid);}

function delGrupo(gid){
  if(!confirm('¿Eliminar el grupo "'+GRUPOS[gid].nombre+'"?')) return;
  delete GRUPOS[gid];
  saveGRUPOS();
  pgGrupos(document.getElementById('main'));
  notif('Grupo eliminado','ok');
}

function _csvDownload(nombre, headers, rows){
  // UTF-8 BOM para Excel en español
  var bom='\uFEFF';
  var lineas=[headers.join(',')].concat(rows.map(function(r){
    return r.map(function(v){
      var s=String(v===null||v===undefined?'':v)
        .replace(/"/g,'""');
      return '"'+s+'"';
    }).join(',');
  }));
  var blob=new Blob([bom+lineas.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=nombre+'_'+_hoyFecha()+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  notif('Descargando '+nombre+'.csv','ok');
}

function _fmtFecha(ts){
  if(!ts) return '';
  var d=new Date(ts);
  return d.toLocaleDateString('es-MX')+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

function _segsToHMS(s){
  s=parseInt(s)||0;
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+'h '+m+'m '+ss+'s';
}

// ── REPORTE 1: Gestión de Base ──
function rptGestionBase(){
  var _fZ=document.getElementById('rpt-zona')&&document.getElementById('rpt-zona').value||'';
  var _fC=document.getElementById('rpt-campus')&&document.getElementById('rpt-campus').value||'';
  var _fOf=document.getElementById('rpt-oferta')&&document.getElementById('rpt-oferta').value||'';
  var _fAgt=document.getElementById('rpt-agente')&&document.getElementById('rpt-agente').value||'';
  var _fEst=document.getElementById('rpt-estado')&&document.getElementById('rpt-estado').value||'';

  var d=all().filter(function(r){
    if(_fZ  && (CAMPUS_ZONA[r.c]||'Otra')!==_fZ) return false;
    if(_fC  && r.c!==_fC)                          return false;
    if(_fOf==='idioma' && !(r.oi&&r.oi!=='Certificación')) return false;
    if(_fOf==='certif' && r.oi!=='Certificación')  return false;
    if(_fOf==='cursos' && !(r.cur&&r.cur.length))  return false;
    return true;
  });

  var headers=[
    'Matrícula','Nombre','Tipo','Campus','Zona','Programa','Plan','Modalidad',
    'Teléfono','Tel. Adicional','Correo','Correo Adicional',
    'Último Nivel Idioma','Calificación','Oferta Calculada',
    'Producto Gestionado','Estado','Tipificación','Comentarios',
    'Tel. Adicional (Tip)','Correo Adicional (Tip)','Costo',
    'Intentos No Contesta','Fecha Callback','Hora Callback',
    'Último Agente','Fecha Última Gestión','Fecha Próx. Callback'
  ];

  var rows=[];
  d.forEach(function(r){
    var ps=PS[r.m]||{};
    var todosProductos=Object.keys(ps);

    // Determinar qué productos incluir según el filtro de oferta
    var productosFiltrados=todosProductos.filter(function(prod){
      if(_fOf==='idioma')  return prod!=='Certificación'&&!r.cur||r.cur.indexOf(prod)<0; // es idioma
      if(_fOf==='certif')  return prod==='Certificación';
      if(_fOf==='cursos')  return r.cur&&r.cur.indexOf(prod)>=0;
      return true; // sin filtro → todos
    });

    // Si no hay productos según filtro → tratar como sin gestión en ese producto
    if(!productosFiltrados.length&&!todosProductos.length){
      if(_fAgt||(_fEst&&_fEst!=='libre')) return;
      rows.push([
        r.m, r.n, r.tp==='I'?'Inscrito':'Egresado',
        r.c, CAMPUS_ZONA[r.c]||'', r.p, r.pl||'', r.mod||'',
        r.t||'', r.t2||'', r.e||'', r.e2||'',
        r.un||'', r.ca||'', r.oi||'',
        '','Libre','','','','','',
        '','','','','',''
      ]);
      return;
    }

    // Si hay filtro de oferta pero ningún producto del prospecto coincide → skip
    if(_fOf&&!productosFiltrados.length) return;

    // Pool a usar: si hay filtro → solo esos productos; si no → todos
    var pool=productosFiltrados.length?productosFiltrados:todosProductos;

    // Dentro del pool, tomar el de ts MÁS RECIENTE (última gestión del tipo filtrado)
    var ultima=null;
    pool.forEach(function(prod){
      var ps2=ps[prod];
      if(!ps2) return;
      if(!ultima||((ps2.ts||0)>(ultima.ts||0))){
        ultima={prod:prod,ps2:ps2,ts:ps2.ts||0};
      }
    });

    // Si no hay gestión en el pool → fila libre (solo si no filtramos por agente/estado)
    if(!ultima){
      if(_fAgt||(_fEst&&_fEst!=='libre')) return;
      rows.push([
        r.m, r.n, r.tp==='I'?'Inscrito':'Egresado',
        r.c, CAMPUS_ZONA[r.c]||'', r.p, r.pl||'', r.mod||'',
        r.t||'', r.t2||'', r.e||'', r.e2||'',
        r.un||'', r.ca||'', r.oi||'',
        '','Libre','','','','','',
        '','','','','',''
      ]);
      return;
    }

    var prod=ultima.prod;
    var ps2=ultima.ps2;

    // Filtros de agente y estado sobre el producto seleccionado
    if(_fAgt && ps2.agente!==_fAgt) return;
    if(_fEst && ps2.estado!==_fEst) return;

    // Callback pendiente para ese producto
    var cb=CALLBACKS.find(function(x){
      return x.mat===r.m&&x.producto===prod&&!x.done;
    });

    // Estado del PRODUCTO específico (no global del prospecto)
    var estProd=(ps2.estado||'libre').replace(/_/g,' ');

    rows.push([
      r.m, r.n, r.tp==='I'?'Inscrito':'Egresado',
      r.c, CAMPUS_ZONA[r.c]||'', r.p, r.pl||'', r.mod||'',
      r.t||'', r.t2||'', r.e||'', r.e2||'',
      r.un||'', r.ca||'', r.oi||'',
      prod,                         // producto filtrado
      estProd,                      // estado de ESE producto
      ps2.tip||'',
      ps2.comment||'',
      ps2.tel2||r.t2||'',
      ps2.email2||r.e2||'',
      ps2.costo||'',
      ps2.intentos||0,
      cb?cb.fecha:'', cb?cb.hora:'',
      ps2.agente||'',
      ps2.ts?_fmtFecha(ps2.ts):'',
      cb?cb.fecha+' '+cb.hora:''
    ]);
  });

  if(!rows.length){notif('Sin datos para este filtro','err');return;}
  notif('Generando '+rows.length+' registros...','ok');
  setTimeout(function(){_csvDownload('Reporte_Gestion_Base',headers,rows);},100);
}

// ── REPORTE 2: Tiempos de Conexión ──
function rptTiempos(){
  var _fAgt2=document.getElementById('rpt2-agente')&&document.getElementById('rpt2-agente').value||'';
  var _fF1=document.getElementById('rpt2-desde')&&document.getElementById('rpt2-desde').value||'';
  var _fF2=document.getElementById('rpt2-hasta')&&document.getElementById('rpt2-hasta').value||_hoyFecha();

  var headers=[
    'Agente','Usuario','Zona','Fecha','Franja Hora',
    'T. Gestión (s)','T. Gestión (hms)',
    'T. Sin Base (s)','T. Sin Base (hms)',
    'T. Pausa (s)','T. Pausa (hms)',
    'T. Total Conectado (s)','T. Total Conectado (hms)'
  ];

  var rows=[];
  var agentes=Object.entries(allU()).filter(function(e){
    return e[1].role==='agent'&&(!_fAgt2||e[0]===_fAgt2);
  });

  agentes.forEach(function(ae){
    var u=ae[0],ud=ae[1];
    var td=TIEMPOS[u]||{};
    Object.keys(td).sort().forEach(function(fecha){
      if(_fF1&&fecha<_fF1) return;
      if(fecha>_fF2) return;
      var df=td[fecha];
      // Por franja
      Object.keys(df).filter(function(k){return k!=='total';}).sort().forEach(function(fr){
        var v=df[fr];
        var tot=(v.enGestion||0)+(v.noProductivo||0)+(v.pausa||0);
        rows.push([
          ud.name, u, ud.zona||CAMPUS_ZONA[ud.campus&&ud.campus[0]]||'',
          fecha, fr,
          v.enGestion||0, _segsToHMS(v.enGestion||0),
          v.noProductivo||0, _segsToHMS(v.noProductivo||0),
          v.pausa||0, _segsToHMS(v.pausa||0),
          tot, _segsToHMS(tot)
        ]);
      });
    });
  });

  if(!rows.length){notif('Sin datos de tiempos para este filtro','err');return;}
  _csvDownload('Reporte_Tiempos_Conexion',headers,rows);
}

// ── REPORTE 3: Productividad por Agente ──
function rptProductividad(){
  var _fF1=document.getElementById('rpt3-desde')&&document.getElementById('rpt3-desde').value||'';
  var _fF2=document.getElementById('rpt3-hasta')&&document.getElementById('rpt3-hasta').value||_hoyFecha();
  var _fAgt3=document.getElementById('rpt3-agente')&&document.getElementById('rpt3-agente').value||'';

  var headers=[
    'Agente','Usuario','Zona','Campus',
    'Período','Tipificaciones','Vendidos','Cancelados','Pendientes Pago',
    'Callbacks','En Seguimiento','Tasa Conv. %',
    'T. Gestión Total (hms)','T. Sin Base Total (hms)','T. Pausa Total (hms)',
    'Horas Productivas','% Tiempo Productivo'
  ];

  var agentes=Object.entries(allU()).filter(function(e){
    return e[1].role==='agent'&&(!_fAgt3||e[0]===_fAgt3);
  });

  var rows=agentes.map(function(ae){
    var u=ae[0],ud=ae[1];
    // Contar gestiones en PS
    var tip=0,vend=0,canc=0,pend=0,cb2=0,segu=0;
    all().forEach(function(r){
      var ps=PS[r.m]||{};
      Object.values(ps).forEach(function(s){
        if(s.agente!==u) return;
        if(s.ts){
          var fd=new Date(s.ts).toISOString().split('T')[0];
          if(_fF1&&fd<_fF1) return;
          if(fd>_fF2) return;
        }
        tip++;
        if(s.estado==='cerrado_ganado')vend++;
        else if(s.estado==='descartado_todo'||s.estado==='descartado')canc++;
        else if(s.estado==='pendiente_pago')pend++;
        else if(s.estado==='callback')cb2++;
        else segu++;
      });
    });
    // Tiempos en el período
    var tGest=0,tNoProd=0,tPausa=0;
    var td=TIEMPOS[u]||{};
    Object.keys(td).forEach(function(fecha){
      if(_fF1&&fecha<_fF1) return;
      if(fecha>_fF2) return;
      var tot=td[fecha].total||{};
      tGest+=(tot.enGestion||0);
      tNoProd+=(tot.noProductivo||0);
      tPausa+=(tot.pausa||0);
    });
    var tTotal=tGest+tNoProd+tPausa;
    var pctProd=tTotal>0?((tGest/tTotal)*100).toFixed(1):0;
    var conv=tip>0?((vend/tip)*100).toFixed(1):0;
    var periodo=(_fF1?_fF1:'inicio')+' al '+_fF2;

    return [
      ud.name, u, ud.zona||'', (ud.campus||[]).join('; '),
      periodo, tip, vend, canc, pend, cb2, segu, conv,
      _segsToHMS(tGest), _segsToHMS(tNoProd), _segsToHMS(tPausa),
      (tGest/3600).toFixed(2), pctProd
    ];
  }).filter(function(r){return r[5]>0||r[12]!=='0h 0m 0s';});

  if(!rows.length){notif('Sin datos de productividad para este filtro','err');return;}
  _csvDownload('Reporte_Productividad',headers,rows);
}

function pgDash(M){
  var _fZ   = window._dFZ   || '';  // filtro zona
  var _fC   = window._dFC   || '';  // filtro campus
  var _fOf  = window._dFOf  || '';  // filtro oferta: ''|'idioma'|'certif'|'cursos'
  var _fNiv = window._dFNiv || '';  // filtro nivel idioma: 'INGLÉS I'...'Certificación'
  var _fCur = window._dFCur || '';  // filtro nombre de curso

  var d = all();
  // Supervisor: solo campus de sus agentes asignados
  if(CU.role==='supervisor'){
    var _grpS=Object.values(GRUPOS).find(function(g){return g.supervisor===CU.username;});
    var _cpSet=new Set();
    if(_grpS&&_grpS.agentes) _grpS.agentes.forEach(function(u){
      var ud2=allU()[u]; if(ud2&&ud2.campus) ud2.campus.forEach(function(cp){_cpSet.add(cp);});
    });
    if(_cpSet.size) d=d.filter(function(r){return _cpSet.has(r.c);});
  }

  // ── Stats por campus (incluye métricas operativas) ──
  var bc = {};
  d.forEach(function(r){
    if(!r.c) return;
    if(!bc[r.c]) bc[r.c]={t:0,id:0,cert:0,cur:0,gest:0,vend:0,canc:0,pgest:0};
    bc[r.c].t++;
    if(r.oi) bc[r.c].id++;
    if(r.oi==='Certificación') bc[r.c].cert++;
    if(r.cur&&r.cur.length) bc[r.c].cur++;
    var _op=estadoOp(r.m);
    if(_op==='ganado')      bc[r.c].vend++;
    else if(_op==='cancelado') bc[r.c].canc++;
    else if(_op==='pendpago'||_op==='callback'||_op==='gestionado') bc[r.c].gest++;
    else                    bc[r.c].pgest++;
  });

  // ── Stats por zona ──
  var bz={};
  ZONA_ORDER.forEach(function(z){bz[z]={t:0,id:0,cert:0,cur:0,gest:0,vend:0,canc:0,pgest:0,campus:[]};});
  Object.keys(bc).forEach(function(cp){
    var v=bc[cp], z=CAMPUS_ZONA[cp]||'Otra';
    if(!bz[z]) bz[z]={t:0,id:0,cert:0,cur:0,gest:0,vend:0,canc:0,pgest:0,campus:[]};
    bz[z].t+=v.t; bz[z].id+=v.id; bz[z].cert+=v.cert; bz[z].cur+=v.cur;
    bz[z].gest+=v.gest; bz[z].vend+=v.vend; bz[z].canc+=v.canc; bz[z].pgest+=v.pgest;
    if(bz[z].campus.indexOf(cp)<0) bz[z].campus.push(cp);
  });

  // ── Campus disponibles según zona seleccionada ──
  var campusPool = Object.keys(bc).filter(function(cp){
    return !_fZ || (CAMPUS_ZONA[cp]||'Otra')===_fZ;
  }).sort();

  // ── Filtrar tabla ──
  var zonasToShow = _fZ ? [_fZ] : ZONA_ORDER;
  var campusList  = _fC ? [_fC]
    : Object.keys(bc).filter(function(cp){
        return !_fZ || (CAMPUS_ZONA[cp]||'Otra')===_fZ;
      });

  // ── Aplicar filtro de oferta a los datos ──
  var dFilt = d.filter(function(r){
    if(_fZ  && (CAMPUS_ZONA[r.c]||'Otra')!==_fZ)  return false;
    if(_fC  && r.c!==_fC)                           return false;
    if(_fOf==='idioma')  { if(!r.oi||r.oi==='Certificación') return false; }
    else if(_fOf==='certif')  { if(r.oi!=='Certificación') return false; }
    else if(_fOf==='cursos')  { if(!r.cur||!r.cur.length) return false; }
    // Subfiltros de nivel y curso
    if(_fNiv && r.oi!==_fNiv) return false;
    if(_fCur && (!r.cur||r.cur.indexOf(_fCur)<0)) return false;
    return true;
  });

  // ── Recalcular bc filtrado con operativos ──
  var bcF={};
  dFilt.forEach(function(r){
    if(!r.c) return;
    if(!bcF[r.c]) bcF[r.c]={t:0,id:0,cert:0,cur:0,gest:0,vend:0,canc:0,pgest:0};
    bcF[r.c].t++;
    if(r.oi) bcF[r.c].id++;
    if(r.oi==='Certificación') bcF[r.c].cert++;
    if(r.cur&&r.cur.length) bcF[r.c].cur++;
    var _opF=estadoOp(r.m);
    if(_opF==='ganado')         bcF[r.c].vend++;
    else if(_opF==='cancelado') bcF[r.c].canc++;
    else if(_opF==='pendpago'||_opF==='callback'||_opF==='gestionado') bcF[r.c].gest++;
    else                        bcF[r.c].pgest++;
  });

  // ── Totales operativos filtrados ──
  var totF={t:dFilt.length,id:0,cert:0,cur:0,
            gestionados:0,vendidos:0,cancelados:0,pendPago:0};
  dFilt.forEach(function(r){
    if(r.oi) totF.id++;
    if(r.oi==='Certificación') totF.cert++;
    if(r.cur&&r.cur.length) totF.cur++;
    // Estados operativos: cruzar con PS
    var ps=PS[r.m]||{};
    var vals=Object.values(ps);
    var tieneGanado   = vals.some(function(s){return s.estado==='cerrado_ganado';});

    var tienePendPago = vals.some(function(s){return s.estado==='pendiente_pago';});
    var tieneGest     = vals.some(function(s){return s.tip||s.estado;});
    if(tieneGanado)        totF.vendidos++;
    else if(tieneCancel)   totF.cancelados++;
    else if(tienePendPago) totF.pendPago++;
    else if(tieneGest)     totF.gestionados++;
  });
  var porGestionar = totF.t - totF.vendidos - totF.cancelados - totF.pendPago - totF.gestionados;

    if(_fZ && (CAMPUS_ZONA[r.c]||'Otra')!==_fZ) return false;

function filtrarZonaDash(zona){
  var rows=document.querySelectorAll('#dash-body tr');
  rows.forEach(function(tr){
    if(!zona){tr.style.display='';return;}
    var isHdr=tr.querySelector('[colspan]');
    if(isHdr){tr.style.display=tr.textContent.indexOf(zona)>=0?'':'none';}
    else{var cp=tr.querySelector('td');if(cp)tr.style.display=(CAMPUS_ZONA[cp.textContent.trim()]===zona)?'':'none';}
  });
}
function filtrarZona(z){goPage('base-idiomas');setTimeout(function(){var s=document.getElementById('fi-zona');if(s){s.value=z;applyF();}},80);}

function pgCursos(M){
  var d=all(),bc={};
  d.forEach(function(r){(r.cur||[]).forEach(function(cu){
    if(!bc[cu])bc[cu]={t:0,ins:0,egr:0,campus:{}};
    bc[cu].t++;bc[cu][r.tp==='I'?'ins':'egr']++;
    bc[cu].campus[r.c]=(bc[cu].campus[r.c]||0)+1;
  });});
  var rows=Object.keys(bc).sort(function(a,b){return bc[b].t-bc[a].t;}).map(function(cu){
    var v=bc[cu];
    var top=Object.keys(v.campus).sort(function(a,b){return v.campus[b]-v.campus[a];}).slice(0,3).map(function(c){return c+'('+fmt(v.campus[c])+')';}).join(' · ');
    return '<tr><td style="font-weight:600;white-space:normal;max-width:300px">'+cu+'</td>'+
      '<td style="text-align:right;font-weight:700;color:var(--c2)">'+fmt(v.t)+'</td>'+
      '<td style="text-align:right;color:var(--gn)">'+fmt(v.ins)+'</td>'+
      '<td style="text-align:right;color:var(--tx2)">'+fmt(v.egr)+'</td>'+
      '<td style="color:var(--tx2);font-size:12px">'+top+'</td>'+
      '<td><button class="bsm" onclick="detCurso(\''+cu.replace(/'/g,"\\'")+'\')">Detalle</button></td></tr>';
  }).join('');
  M.innerHTML='<div class="page">'+
    '<div class="phdr"><div><div class="ptitle">Base de Cursos</div><div class="psub">'+Object.keys(bc).length+' cursos con prospectos disponibles</div></div></div>'+
    (d.length===0?'<div class="twrap"><div class="empty"><div class="empty-ico">📚</div>Carga los datos en Actualizar Datos</div></div>':
    '<div class="twrap">'+
    '<div class="stitle">Prospectos por curso <span>Clic en Detalle para ver desglose por campus</span></div>'+
    '<div style="overflow-x:auto"><table><thead><tr>'+
    '<th>Curso</th><th style="text-align:right">Total</th><th style="text-align:right">Inscritos</th>'+
    '<th style="text-align:right">Egresados</th><th>Top Campus</th><th></th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>')+
    '</div>';
}
function detCurso(cu){
  var d=all().filter(function(r){return(r.cur||[]).indexOf(cu)>=0;});
  var bz={},bc={};
  d.forEach(function(r){
    var z=r.z||'—';bz[z]=(bz[z]||0)+1;
    bc[r.c]=(bc[r.c]||0)+1;
  });
  var zRows=Object.keys(bz).sort(function(a,b){return bz[b]-bz[a];}).map(function(z){
    return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px"><span>'+zonaPill('')+' '+z+'</span><b style="color:var(--c2)">'+fmt(bz[z])+'</b></div>';
  }).join('');
  var cpRows=Object.keys(bc).sort(function(a,b){return bc[b]-bc[a];}).map(function(c){
    return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;padding-left:12px"><span style="color:var(--tx2)">'+c+'</span><b>'+fmt(bc[c])+'</b></div>';
  }).join('');
  openModal('Detalle: '+cu,
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">'+
    '<div><div style="font-size:11px;font-weight:700;color:var(--c2);margin-bottom:.5rem;letter-spacing:.06em">POR ZONA</div>'+zRows+'</div>'+
    '<div><div style="font-size:11px;font-weight:700;color:var(--c2);margin-bottom:.5rem;letter-spacing:.06em">POR CAMPUS</div>'+cpRows+'</div>'+
    '</div><div style="margin-top:1rem;background:var(--bg2);border-radius:var(--r2);padding:.75rem;font-size:13px;color:var(--tx2)">'+
    'Total: <b style="color:var(--c3)">'+fmt(d.length)+' prospectos</b></div>');
}

function renderT(){

  var pi=document.getElementById('pginfo');
  if(pi) pi.textContent='Pág '+(pg+1)+'/'+tot;
  var bp=document.getElementById('bprev'),bn=document.getElementById('bnext');
  if(bp) bp.disabled=(pg===0);
  if(bn) bn.disabled=(pg>=tot-1);
  var sl=fData.slice(pg*PS_SIZE,(pg+1)*PS_SIZE);
  if(!sl.length){
    tb.innerHTML='<tr><td colspan="12" class="empty"><div class="empty-ico">🔍</div>Sin resultados</td></tr>';
    return;
  }
  var isAgent=CU&&CU.role==='agent';

  var esCursos=tabCur&&tabCur.style.borderBottomColor&&tabCur.style.borderBottomColor.indexOf('0070')>=0;
  var rows=[];

    }
    row+='<td style="color:var(--tx2);font-size:12px;max-width:140px">'+(r.p||'—')+'</td>';
    row+='<td class="mat" style="font-size:11px">'+(r.pl||'—')+'</td>';

    row+='<td style="font-size:11px;color:var(--tx2);max-width:120px">'+(r.e||'—')+'</td>';

      row+='<td style="font-size:12px;color:var(--tx2)">'+(r.un||'—')+'</td>';
      row+='<td>'+calBadge(r.ca)+'</td>';
      row+='<td>'+idBadge(r.oi)+'</td>';

  if(tc) tc.textContent=fmt(fData.length)+' prospectos';
}

function _abrirSiguienteProspecto(idx){
  var oa=window._ofertaActiva;
  if(!oa) return;
  var colaKey=CU.username+'|'+oa.tipo+'|'+oa.valor;
  var cola=window._colas&&window._colas[colaKey];

  // Filtrar cola con DB cacheada (sin psLoad — PS ya sync por BC)
  if(cola){
    var _db=all(); // una sola llamada cacheada
    cola.lista=cola.lista.filter(function(mat){
      var ps=PS[mat]||{},pv=ps[oa.valor]||{};
      if(Object.values(ps).some(function(s){return s.estado==='descartado_todo';})) return false;
      if(pv.estado==='descartado') return false;
      if(pv.estado==='cerrado_ganado'&&pv.agente&&pv.agente!==CU.username) return false;
      return true;
    });
    fData=cola.lista.map(function(mat){
      return _db.find(function(r){return r.m===mat;});
    }).filter(Boolean);
    if(idx>=cola.lista.length) idx=0;
    cola.pos=idx;
  }

  if(!fData||!fData.length){
    window._miBaseMsg={tipo:'ok',txt:'\u2713 Todos los prospectos de este segmento han sido gestionados.'};
    if(cola) cola.pos=0;
    goPage('mi-base');
    return;
  }

  var pos=Math.min(idx,fData.length-1);
  // Try-lock simplificado: JS es mono-hilo por pestaña
  // El único caso de colisión es entre pestañas distintas via BLOQ (localStorage/BC)
  var posLibre=pos;
  var intentos=0;
  var matElegido=null;

  while(intentos<fData.length){
    var candidato=fData[posLibre].m;
    var b=bloqGet(candidato);
    if(!b){
      // Libre — bloquear y tomar inmediatamente (mono-hilo: no hay race)
      bloqSet(candidato, CU.username);
      matElegido=candidato;
      break;
    } else if(b.agente===CU.username){
      // Ya era nuestro (otra pestaña del mismo agente)
      matElegido=candidato;
      break;
    }
    posLibre=(posLibre+1)%fData.length;
    intentos++;
  }

  if(!matElegido){
    // Limpiar bloqueos propios expirados y reintentar una vez
    var propios=fData.filter(function(r){
      var b=bloqGet(r.m); return b&&b.agente===CU.username;
    });
    if(propios.length){
      propios.forEach(function(r){ bloqClear(r.m); });
      for(var ri=0;ri<fData.length;ri++){
        if(!bloqGet(fData[ri].m)){
          bloqSet(fData[ri].m, CU.username);
          matElegido=fData[ri].m;
          window._posActual=ri;
          if(cola) cola.pos=ri;
          openFicha(matElegido);
          return;
        }
      }
    }
    var bloqueadosPorOtros=fData.filter(function(r){
      var b=bloqGet(r.m); return b&&b.agente!==CU.username;
    }).length;
    window._miBaseMsg = bloqueadosPorOtros>0
      ? {tipo:'warn', txt:'Prospectos en atenci\xf3n por otros agentes. Intenta nuevamente en un momento.'}
      : {tipo:'ok',   txt:'\u2713 Todos los prospectos de este segmento han sido gestionados.'};
    goPage('mi-base');
    return;
  }

  window._posActual=posLibre;
  if(cola) cola.pos=posLibre;
  openFicha(matElegido);
}

function saltarProspecto(mat){
  closeDrawer();
  _abrirSiguienteProspecto((window._posActual||0)+1);
}

      +'padding:3px 10px;border-radius:12px;border:1px solid rgba(78,173,243,.3);'
      +'background:rgba(78,173,243,.1);color:var(--c1);margin-left:4px">'
      +(window._ofertaActiva.tipo==='idioma'?'&#x1F310;':'&#x1F4DA;')+' '+window._ofertaActiva.valor
      +'</span>':'')+
    '</div>'+
    '</div>'+
    '<button class="bsm" style="background:rgba(255,255,255,.12);border-color:rgba(78,173,243,.3);color:#c9d8f0" onclick="closeDrawer()">&#x2715;</button>'+
    '</div>'+
    // Cuerpo 2 columnas
    '<div class="ficha-body">'+
    datosCol+
    gestionCol+
    '</div>'+
    '</div>';

  // Renderizar en el main (no en el drawer)
  document.getElementById('main').innerHTML=fichaHTML;

  fichaActual={rec:r,productos:productos};
  // Timer: agente abrió ficha → en gestión
  if(CU&&CU.role==='agent'){
    if(!AGENTE_STATUS[CU.username]) AGENTE_STATUS[CU.username]={tipHoy:0,ventasHoy:0};
    AGENTE_STATUS[CU.username].estado='en_gestion';
    AGENTE_STATUS[CU.username].desde=Date.now();
    AGENTE_STATUS[CU.username].ficha={mat:r.m,nombre:r.n,producto:''};
    iniciarTimer('enGestion');
  }
  if(isAgent&&productos.length){
    var idxProd=0;
    if(productoPresel){
      var fi=productos.findIndex(function(p){return p.nombre===productoPresel;});
      if(fi>=0) idxProd=fi;
    }
    // Mostrar tipificación directamente
    switchProdTab(idxProd,r.m);
  }
}

function guardarTip(mat){
  var r=all().find(function(x){return x.m===mat;});if(!r)return false;
  var sel=document.getElementById('tip-sel');
  if(!sel||!sel.value){notif('Selecciona una tipificaci\xf3n','err');return;}
  var tipVal=sel.value;
  var t=TIPIFICACIONES.find(function(x){return x.tip===tipVal;});
  var prod=fichaActual&&fichaActual.prodActual;
  var prodNombre=prod?prod.nombre:'';
  var comment=(document.getElementById('tip-comment')||{value:''}).value;
  var tel2=(document.getElementById('tip-tel2')||{value:''}).value.trim();
  var email2=(document.getElementById('tip-email2')||{value:''}).value.trim();
  var costo=(document.getElementById('tip-costo')||{value:''}).value;
  var producto2=(document.getElementById('tip-producto')||{value:''}).value;
  if(tel2&&!/^\d{10}$/.test(tel2)){notif('El tel\xe9fono debe tener 10 d\xedgitos','err');return;}
  if(email2&&!/^[^@]+@[^@]+\.[^@]+$/.test(email2)){notif('Correo adicional inv\xe1lido','err');return;}
  if(tel2) r.t2=tel2;
  if(email2) r.e2=email2;
  bloqSet(mat,CU.username);
  psSync();
  bcSend({type:'ps_update'});
  try{localStorage.setItem('crm_ps_ts',Date.now().toString());}catch(e){}
  var now=Date.now();
  var estado='contactado';
  if(t.accion==='cerrar_ganado'){
    // Re-verificar que el prospecto no fue descartado_todo por otro agente
    // mientras esta pestaña pasaba el filtro inicial (race condition prevention)
    var psActual=PS[mat]||{};
    var yaDescartado=Object.values(psActual).some(function(s){return s.estado==='descartado_todo';});
    if(yaDescartado){
      notif('Prospecto descartado por otro agente — no se puede ganar','err');
      bloqClear(mat,CU.username);
      return false;
    }
    estado='cerrado_ganado';
  }
  else if(t.accion==='pendiente_pago') estado='pendiente_pago';
  else if(t.accion==='callback') estado='callback';
  else if(t.accion==='descartar_todo') estado='descartado_todo';
  else if(t.accion==='cerrar_producto') estado='cerrado_producto';
  else if(t.accion==='volver_cola') estado='libre';
  else if(t.accion==='no_contesta'){
    var ps2=getPS(mat,prodNombre);
    var intentos=(ps2.intentos||0)+1;
    estado=intentos>=12?'descartado':'no_contesta';
    setPS(mat,prodNombre,{intentos:intentos});
  }
  setPS(mat,prodNombre,{agente:CU.username,estado:estado,tip:tipVal,comment:comment,ts:now,producto:producto2,costo:costo,_accion:t.accion});
  if(t.accion==='callback'){
    var cbDate=document.getElementById('cb-date')?document.getElementById('cb-date').value:'';
    var cbTime=document.getElementById('cb-time')?document.getElementById('cb-time').value:'';
    if(!cbDate||!cbTime){
      notif('Debes seleccionar fecha y hora para el callback','err');
      return false;
    }
    var ci=CALLBACKS.findIndex(function(x){return x.mat===mat&&x.producto===prodNombre&&x.agente===CU.username;});
    var nc={mat:mat,nombre:r.n,agente:CU.username,producto:prodNombre,fecha:cbDate,hora:cbTime,done:false,ts:Date.now()};
    if(ci>=0) CALLBACKS[ci]=nc; else CALLBACKS.push(nc);
  }
  if(t.accion!=='callback'){
    var ci=CALLBACKS.findIndex(function(x){return x.mat===mat&&x.producto===prodNombre&&x.agente===CU.username&&!x.done;});
    if(ci>=0) CALLBACKS[ci].done=true;
  }
  if(t.accion==='pendiente_pago'){
    // Agregar o actualizar en PENDPAGO
    // Clave única por mat+producto (sin importar agente) para evitar duplicados multi-agente
    var piExist=PENDPAGO.findIndex(function(x){return x.mat===mat&&x.producto===(producto2||prodNombre);});
    var pendEntry={mat:mat,nombre:r.n,agente:CU.username,producto:producto2||prodNombre,costo:costo,ts:now,activo:true};
    if(piExist>=0) PENDPAGO[piExist]=pendEntry; else PENDPAGO.push(pendEntry);
    savePENDPAGO();
  } else {
    // Cualquier otra tipificación sobre un prospecto en PENDPAGO → desactivarlo
    // Inactivar por mat+prod (sin filtrar agente — el pendiente es del prospecto)
    var piDel=PENDPAGO.findIndex(function(x){
      return x.mat===mat&&x.producto===(producto2||prodNombre)&&x.activo;
    });
    if(piDel>=0){
      PENDPAGO[piDel].activo=false;
      savePENDPAGO();
    }
  }
  notif('Tipificaci\xf3n guardada: '+tipVal,'ok');
  return true;
}

function finalizarTip(mat){
  var ok=guardarTip(mat); if(!ok) return;
  var prod=fichaActual&&fichaActual.prodActual;
  var prodNombre=prod?prod.nombre:'';
  var ps=getPS(mat,prodNombre);
  var accion=ps._accion||'';

  var msgs={
    cerrar_ganado:'\u2705 Inscripci\xf3n ganada',
    cerrar_producto:'\u2713 Cerrado',
    descartar_todo:'Descartado',
    descartar:'Descartado',
    volver_cola:'\u21a9 En cola',
    callback:'&#x1F4DE; Callback agendado',
    no_contesta:'Sin respuesta \u21a9',
    pendiente_pago:'\u23f3 Pendiente'
  };
  notif(msgs[accion]||'Guardado','ok');
  // Registrar actividad en AGENTE_STATUS
  if(CU&&CU.role==='agent'&&AGENTE_STATUS[CU.username]){
    AGENTE_STATUS[CU.username].tipHoy=(AGENTE_STATUS[CU.username].tipHoy||0)+1;
    if(accion==='cerrar_ganado')
      AGENTE_STATUS[CU.username].ventasHoy=(AGENTE_STATUS[CU.username].ventasHoy||0)+1;
  }

    // (dots de estado eliminados — redundantes con campo Oferta)

  // ── ¿Era un callback con contexto previo? ──
  var ctx=window._cbContexto;
  if(ctx&&ctx.esCallback&&ctx.cbMat===mat){
    // Limpiar el contexto de callback
    window._cbContexto=null;
    closeDrawer();

    // Restaurar la oferta activa original
    if(ctx.ofertaActiva){
      window._ofertaActiva=ctx.ofertaActiva;
    }

    if(ctx.fichaAnterior&&ctx.fichaAnterior.rec){
      // El agente tenía una ficha abierta antes del callback → restaurarla
      notif('Callback gestionado \u2714 Volviendo a tu prospecto anterior','ok');
      var rec=ctx.fichaAnterior.rec;
      var prodPrev=ctx.fichaAnterior.prodActual;
      openFicha(rec.m, prodPrev?prodPrev.nombre:undefined);
    } else if(ctx.ofertaActiva){
      // No había ficha previa — continuar con la cola desde donde estaba
      notif('Callback gestionado \u2714 Continuando con tu base','ok');
      _abrirSiguienteProspecto(ctx.posActual);
    } else {
      // Sin contexto previo — solo cerrar
      notif('Callback gestionado \u2714','ok');
    }
    return;
  }

  // ── Flujo normal (no era callback) ──
  var oa=window._ofertaActiva;
  var colaKey=oa?(CU.username+'|'+oa.tipo+'|'+oa.valor):null;
  var cola=colaKey&&window._colas&&window._colas[colaKey];
  var pos=window._posActual||0;
  closeDrawer();

  if(cola){
    if(accion==='cerrar_ganado'||accion==='cerrar_producto'||
       accion==='descartar_todo'||accion==='descartar'){
      cola.lista.splice(pos,1);
    } else if(accion==='volver_cola'||accion==='no_contesta'){
      if(getPS(mat,prodNombre).estado==='descartado'){
        cola.lista.splice(pos,1);
      } else {
        var m2=cola.lista.splice(pos,1)[0];
        cola.lista.push(m2);
      }
    } else if(accion==='callback'){
      cola.lista.splice(pos,1);
    } else {
      pos++;
    }
  } else {
    pos++;
  }
  _abrirSiguienteProspecto(pos);
}

function pgMiBase(M){
  var a=ASGN[CU.username]||{};
  var d=all();
  // Filtrar por campus y tipo del agente
  if(a.campus&&a.campus.length) d=d.filter(function(r){return a.campus.indexOf(r.c)>=0;});
  if(a.tipos&&a.tipos.length<2) d=d.filter(function(r){return a.tipos.indexOf(r.tp)>=0;});
  d=d.filter(function(r){return !Object.values(PS[r.m]||{}).some(function(s){return s.estado==='descartado_todo';});});
  tData=d; fData=d.slice(); sCol=''; sDir=1; pg=0;

  // Oferta asignada
  var oId=null, todosIdioma=false;
  if(a.oferta&&a.oferta.length){
    if(a.oferta[0]==='__todos__') todosIdioma=true;
    else oId=a.oferta;
  }
  var oCu=null, todosCurso=false;
  if(a.cursos&&a.cursos.length){
    if(a.cursos[0]==='__todos__') todosCurso=true;
    else oCu=a.cursos;
  }

  // Solo prospectos de la base asignada
  var dId=(todosIdioma||oId)
    ?d.filter(function(r){return r.oi&&(todosIdioma||oId.indexOf(r.oi)>=0);})
    :[];
  var dCu=(todosCurso||oCu)
    ?d.filter(function(r){return r.cur&&r.cur.length&&(todosCurso||(r.cur.some(function(cu){return oCu.indexOf(cu)>=0;})));})
    :[];

  // Prospectos únicos en la base asignada
  var _mats={};
  dId.forEach(function(r){_mats[r.m]=1;});
  dCu.forEach(function(r){_mats[r.m]=1;});
  var totalBase=Object.keys(_mats).length;

  // Contadores solo sobre la base asignada
  var ganados=0, gestionados=0;
  Object.keys(_mats).forEach(function(m){
    var v=Object.values(PS[m]||{});
    if(v.some(function(s){return s.estado==='cerrado_ganado';})) ganados++;
    if(v.some(function(s){return s.tip;})) gestionados++;
  });
  var faltantes=totalBase-ganados;

  function mkCards(lista,tipo){
    var g={};
    lista.forEach(function(r){
      if(tipo==='idioma'){if(!g[r.oi])g[r.oi]=[];g[r.oi].push(r);}
      else{(r.cur||[]).forEach(function(cu){
        if(oCu&&oCu.indexOf(cu)<0)return;
        if(!g[cu])g[cu]=[];
        if(g[cu].indexOf(r)<0)g[cu].push(r);
      });}
    });
    return Object.keys(g).sort().map(function(k){
      var list=g[k];
      var gn=list.filter(function(r){return Object.values(PS[r.m]||{}).some(function(s){return s.estado==='cerrado_ganado';});}).length;
      var pct=list.length>0?Math.round(gn/list.length*100):0;
      var pend=list.length-gn;
      return '<div class="oferta-card" onclick="verOfertas(\''+tipo+'\',\''+k.replace(/'/g,"\\'")+'\')">'
        +'<div class="oc-icon">'+(tipo==='idioma'?'&#x1F310;':'&#x1F4DA;')+'</div>'
        +'<div class="oc-nombre">'+k+'</div>'
        +'<div class="oc-total">'+fmt(list.length)+' prospectos</div>'
        +'<div class="oc-bar"><div class="oc-fill" style="width:'+pct+'%"></div></div>'
        +'<div class="oc-stats">'
          +'<span style="color:var(--gn)">'+fmt(gn)+' ganados</span>'
          +'<span style="color:var(--tx2)">'+fmt(pend)+' pendientes</span>'
        +'</div>'
        +'<div class="oc-cta">Ver prospectos &#x2192;</div>'
        +'</div>';
    }).join('');
  }

  // Banner aviso si viene de base agotada
  var bannerMsg='';
  if(window._miBaseMsg){
    var mb=window._miBaseMsg; window._miBaseMsg=null;
    var bg=mb.tipo==='ok'?'rgba(0,204,102,.1)':'rgba(255,128,33,.08)';
    var bc=mb.tipo==='ok'?'rgba(0,204,102,.25)':'rgba(255,128,33,.25)';
    var col=mb.tipo==='ok'?'var(--gn)':'var(--o1)';
    bannerMsg='<div style="margin-bottom:1rem;padding:.75rem 1.1rem;border-radius:var(--r2);'
      +'background:'+bg+';border:1px solid '+bc+';color:'+col+';font-size:13px;'
      +'display:flex;align-items:center;gap:.6rem">'
      +'<span>'+(mb.tipo==='ok'?'✓':'⏱')+'</span><span>'+mb.txt+'</span>'
      +'</div>';
  }

  M.innerHTML='<div class="page">'
    // Contadores: solo de la base asignada
    +'<div class="sgrid">'
    +'<div class="sc sc-blue"><div class="sn">'+fmt(totalBase)+'</div><div class="sl">Base asignada</div></div>'
    +'<div class="sc sc-green"><div class="sn">'+fmt(ganados)+'</div><div class="sl">Ganados</div></div>'
    +'<div class="sc sc-blue"><div class="sn">'+fmt(gestionados)+'</div><div class="sl">Gestionados</div></div>'
    +'<div class="sc sc-red"><div class="sn" style="color:var(--o1)">'+fmt(faltantes)+'</div><div class="sl">Por gestionar</div></div>'
    +'</div>'
    +bannerMsg
    +(dId.length?'<div class="sec-lbl">&#x1F310; IDIOMAS ASIGNADOS</div><div class="oferta-grid">'+mkCards(dId,'idioma')+'</div>':'')
    +(dCu.length?'<div class="sec-lbl">&#x1F4DA; CURSOS ASIGNADOS</div><div class="oferta-grid">'+mkCards(dCu,'curso')+'</div>':'')
    +((!dId.length&&!dCu.length)?'<div style="background:rgba(78,173,243,.05);border:1px solid rgba(78,173,243,.1);border-radius:var(--r);padding:2rem;text-align:center;color:var(--tx3);margin-top:1rem">'
      +(all().length===0
        // DB no cargada — agente puede cargar sus propios CSV
        ?'<div style="font-size:2rem;margin-bottom:.5rem">&#x1F4E5;</div>'
