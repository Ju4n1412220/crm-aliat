function verOfertas(tipo,valor){
  window._ofertaActiva={tipo:tipo,valor:valor};
  var colaKey=CU.username+'|'+tipo+'|'+valor;
  if(!window._colas) window._colas={};

  if(!window._colas[colaKey]){
    // ── 1. Base filtrada por asignación del agente (igual que pgMiBase) ──
    var asgn=ASGN[CU.username]||{};
    var base=all();
    // Filtrar por campus asignado
    if(asgn.campus&&asgn.campus.length)
      base=base.filter(function(r){return asgn.campus.indexOf(r.c)>=0;});
    // Filtrar por tipo (Ins/Egr)
    if(asgn.tipos&&asgn.tipos.length<2)
      base=base.filter(function(r){return asgn.tipos.indexOf(r.tp)>=0;});

    // ── 2. Filtrar por oferta específica del agente ──
    // Verificar que el valor está dentro de la asignación permitida
    if(tipo==='idioma'){
      var oIdV=asgn.oferta&&asgn.oferta.length?asgn.oferta:null;
      var todosV=oIdV&&oIdV[0]==='__todos__';
      if(!todosV&&oIdV&&oIdV.indexOf(valor)<0){
        notif('Esta oferta no está en tu asignación','err'); return;
      }
    } else {
      var oCuV=asgn.cursos&&asgn.cursos.length?asgn.cursos:null;
      var todosCuV=oCuV&&oCuV[0]==='__todos__';
      if(!todosCuV&&oCuV&&oCuV.indexOf(valor)<0){
        notif('Este curso no está en tu asignación','err'); return;
      }
    }
    var lista=tipo==='idioma'
      ?base.filter(function(r){return r.oi===valor;})
      :base.filter(function(r){return (r.cur||[]).indexOf(valor)>=0;});

    // ── 3. Reglas de negocio ──
    lista=lista.filter(function(r){
      var ps=PS[r.m]||{},pv=ps[valor]||{};
      // Descartados totales: fuera para todos
      if(Object.values(ps).some(function(s){return s.estado==='descartado_todo';})) return false;
      // Descartados para este producto: fuera
      if(pv.estado==='descartado') return false;
      // Ganados por OTRO agente: no reasignar
      if(pv.estado==='cerrado_ganado'&&pv.agente&&pv.agente!==CU.username) return false;
      return true;
    });

    // ── 4. Ordenar: primero libres, luego por estado ──
    var ord={libre:0,no_contesta:1,volver_cola:1,callback:2,
             contactado:3,pendiente_pago:3,cerrado_ganado:4};
    lista.sort(function(x,y){
      var sa=(PS[x.m]&&PS[x.m][valor])?PS[x.m][valor].estado:'libre';
      var sb=(PS[y.m]&&PS[y.m][valor])?PS[y.m][valor].estado:'libre';
      return (ord[sa]||0)-(ord[sb]||0);
    });

    // ── 5. Partición de lista por agente (segmentos disjuntos) ──
    // Obtener lista de todos los agentes con la MISMA combinación de campus+tipo
    var todosAgtsMismaBase = Object.keys(allU()).filter(function(u){
      var ud = allU()[u];
      if(ud.role !== 'agent') return false;
      var au = ASGN[u]||{};
      // Mismo campus y tipo que el agente actual
      var mismoC = JSON.stringify((au.campus||[]).sort()) === JSON.stringify((asgn.campus||[]).sort());
      var mismoT = JSON.stringify((au.tipos||[]).sort()) === JSON.stringify((asgn.tipos||[]).sort());
      return mismoC && mismoT;
    }).sort(); // orden consistente entre todos los agentes

    var miIdx = todosAgtsMismaBase.indexOf(CU.username);
    var nAgt  = todosAgtsMismaBase.length || 1;
    if(miIdx < 0) miIdx = 0;

    // Calcular mi segmento
    var segSize   = Math.ceil(lista.length / nAgt);
    var segStart  = miIdx * segSize;
    var segEnd    = Math.min(segStart + segSize, lista.length);
    var miSegmento = lista.slice(segStart, segEnd);

    // Si mi segmento quedó vacío (más agentes que prospectos), usar lista completa
    if(!miSegmento.length) miSegmento = lista;

    window._colas[colaKey]={
      lista: miSegmento.map(function(r){return r.m;}),
      pos: 0,
      total: lista.length,
      segInfo: {idx:miIdx, total:nAgt, start:segStart, end:segEnd}
    };
    console.log('[CRM] Cola '+colaKey+': segmento '+miIdx+'/'+nAgt
      +' ('+miSegmento.length+' prospectos de '+lista.length+' totales)');
  }

  var cola=window._colas[colaKey];
  // Reconstruir fData desde la DB actual (por si cambió desde que se creó la cola)
  fData=cola.lista.map(function(mat){
    return all().find(function(r){return r.m===mat;});
  }).filter(Boolean);

  if(!fData.length){
    notif('Sin prospectos disponibles para esta oferta','warn');
    return;
  }
  _abrirSiguienteProspecto(cola.pos);
}

function startCallbackTimer(){
  if(callbackTimer)clearInterval(callbackTimer);
  callbackTimer=setInterval(checkCallbacks,60000);
  checkCallbacks();
}
function checkCallbacks(){
  if(!CU||CU.role!=='agent')return;
  var now=new Date();
  CALLBACKS.forEach(function(cb){
    if(cb.done||cb.agente!==CU.username)return;
    var cbDt=new Date(cb.fecha+'T'+cb.hora);
    var diff=(cbDt-now)/60000;
    if(diff<=5&&diff>=-1) showAlert(cb);
  });
}
function showAlert(cb){
  var bar=document.getElementById('alert-bar');
  var id='al-'+cb.mat;
  if(document.getElementById(id))return;
  var el=document.createElement('div');
  el.className='alert-item callback'; el.id=id;
  el.innerHTML='<div class="alert-ico">&#x1F4DE;</div>'+
    '<div>'+
    '<div class="alert-title">&#x260E; Callback pendiente</div>'+
    '<div class="alert-body">'+cb.nombre+' &middot; '+cb.hora+'</div>'+
    '<div style="font-size:10px;color:var(--c1);margin-top:2px">'+cb.producto+'</div>'+
    '</div>';
  el.onclick=function(){
    cb.done=true;
    el.remove();
    abrirCallback(cb);
  };
  bar.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.remove();},300000);
}

// Abrir ficha de callback preservando el contexto actual del agente
function abrirCallback(cb){

  window._cbContexto={

    ofertaActiva: window._ofertaActiva,  // oferta que estaba gestionando
    posActual: window._posActual||0,     // posición en la cola
    esCallback: true,
    cbMat: cb.mat,
    cbProducto: cb.producto
  };

  openFicha(cb.mat, cb.producto);
}

function saveAsgn(){
  var ud=getU(asgnTgt);
  var fixC=ud.campus&&ud.campus.length>0;
  var campus=fixC?ud.campus:
    Array.from(document.querySelectorAll('#ma-campus input:checked')).map(function(e){return e.value;});
  var tv=document.getElementById('ma-tipo');
  var tipos=tv&&tv.value==='I'?['I']:tv&&tv.value==='E'?['E']:['I','E'];
  // Leer oferta: si "Todos" está marcado → ['__todos__'], si ninguno → []
  var ofertaChk=Array.from(document.querySelectorAll('#ma-oferta input:checked')).map(function(e){return e.value;});
  var oferta=ofertaChk.indexOf('__todos__')>=0?['__todos__']:ofertaChk;
  // Leer cursos: igual
  var cursosChk=Array.from(document.querySelectorAll('#ma-cursos input:checked')).map(function(e){return e.value;});
  var cursos=cursosChk.indexOf('__todos__')>=0?['__todos__']:cursosChk;
  if(!fixC&&!campus.length){notif('Selecciona al menos un campus','err');return;}
  ASGN[asgnTgt]={campus:campus,tipos:tipos,oferta:oferta,cursos:cursos};
  // Persistir
  try{
    var ats=Date.now();
    localStorage.setItem('crm_asgn', JSON.stringify(ASGN));
    localStorage.setItem('crm_asgn_ts', ats.toString());
  }catch(e){}
  // BroadcastChannel: enviar asignación + DB completa al agente
  bcSend({type:'asgn_update', asgn:ASGN, ins:DB.ins, egr:DB.egr});
  console.log('[CRM] ASGN broadcast enviado para '+asgnTgt+' con '+DB.ins.length+' ins');
  document.getElementById('m-asgn').classList.remove('on');
  notif('Asignacion guardada: '+ud.name,'ok');
  pgAsignar(document.getElementById('main'));
}

function deleteUser(u){
  if(!u||SYS[u]){notif('No se puede eliminar usuario del sistema','err');return;}
  if(!confirm('¿Eliminar usuario '+u+'? Esta acción no se puede deshacer.')) return;
  // Limpiar de grupos
  Object.keys(GRUPOS).forEach(function(gid){
    if(GRUPOS[gid].supervisor===u) GRUPOS[gid].supervisor='';
    if(GRUPOS[gid].agentes){
      var idx=GRUPOS[gid].agentes.indexOf(u);
      if(idx>=0) GRUPOS[gid].agentes.splice(idx,1);
    }
  });
  saveGRUPOS();
  // Limpiar asignaciones
  delete ASGN[u];
  saveASGN();
  // Eliminar usuario
  delete EXTRA[u];
  saveEXTRA();
  // Eliminar de Firebase
  if(FB_ONLINE){
    db.collection('usuarios').doc(u).delete().catch(function(){});
    db.collection('asignaciones').doc(u).delete().catch(function(){});
  }
  notif('Usuario '+u+' eliminado','ok');
  pgUsuarios(document.getElementById('main'));
}

function saveUser(){
  var name=document.getElementById('nu-name').value.trim();
  var u=document.getElementById('nu-user').value.trim();
  var pass=document.getElementById('nu-pass').value;
  var role=document.getElementById('nu-role').value;
  // Supervisor solo puede crear agentes (no otros supervisores ni admins)
  if(CU.role==='supervisor'&&role!=='agent'){
    notif('El supervisor solo puede crear agentes','err');
    return;
  }
  // Leer campus de checkboxes
  var campusList2=Array.from(document.querySelectorAll('input[name="nu-campus-chk"]:checked')).map(function(e){return e.value;});
  if(!name||!u||!pass){notif('Completa todos los campos','err');return;}
  if((role==='agent'||role==='supervisor')&&!campusList2.length){notif('Selecciona al menos un campus','err');return;}
  if(getU(u)){notif('El usuario '+u+' ya existe','err');return;}
  // Detectar zona automáticamente por primer campus
  var zona=campusList2.length?CAMPUS_ZONA[campusList2[0]]||'':'';
  // Guardar contraseña como hash SHA-256
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(pass))
    .then(function(buf){
      var hash=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      EXTRA[u]={pass:hash,role:role,name:name,campus:campusList2,zona:zona};
      saveEXTRA(); bcSend({type:'user_update',extra:EXTRA});
      closeModal(); notif('Usuario creado','ok');
      pgUsuarios(document.getElementById('main'));
    });
  return; // esperar async
  saveEXTRA();
  if(campusList2.length){
    ASGN[u]={campus:campusList2,tipos:['I','E'],oferta:[],cursos:[]};
    saveASGN();
  }
  try{localStorage.setItem('crm_users_ts',Date.now().toString());}catch(e){}
  bcSend({type:'user_update', extra:EXTRA, asgn:ASGN});
  closeModal();
  notif('Usuario '+u+' creado ('+campusList2.join(', ')+')','ok');
  pgUsuarios(document.getElementById('main'));
}

function saveEditUser(u){
  var ud=getU(u);
  if(!ud){ notif('Usuario no encontrado','err'); return; }

  var name=document.getElementById('eu-name').value.trim();
  var pass=document.getElementById('eu-pass').value;
  var nuevoRol=document.getElementById('eu-role')&&document.getElementById('eu-role').value;
  if(!name){ notif('El nombre no puede estar vacío','err'); return; }

  // Validar cambio de rol en vivo
  var rolActual=ud.role;
  var cambioDeRol=nuevoRol&&nuevoRol!==rolActual&&!SYS[u];

  if(cambioDeRol){
    // Si era supervisor → limpiar de grupos donde era supervisor
    if(rolActual==='supervisor'){
      Object.keys(GRUPOS).forEach(function(gid){
        if(GRUPOS[gid].supervisor===u) GRUPOS[gid].supervisor='';
      });
      saveGRUPOS();
    }
    // Si era agente → limpiar de grupos donde era miembro
    if(rolActual==='agent'){
      Object.keys(GRUPOS).forEach(function(gid){
        var idx=GRUPOS[gid].agentes?GRUPOS[gid].agentes.indexOf(u):-1;
        if(idx>=0) GRUPOS[gid].agentes.splice(idx,1);
      });
      saveGRUPOS();
    }
    // Limpiar ASGN si cambia a admin o supervisor
    if(nuevoRol==='admin'){
      delete ASGN[u];
      saveASGN();
    }
    // Aplicar nuevo rol
    EXTRA[u].role=nuevoRol;
    // Si el usuario afectado es la sesión activa → forzar logout
    if(u===CU.username){
      notif('Tu rol fue cambiado — cerrando sesión','err');
      setTimeout(function(){doLogout();},1500);
      return;
    }
    // Notificar a otras pestañas del cambio de rol
    bcSend({type:'role_change',user:u,nuevoRol:nuevoRol});
    notif('Rol cambiado a '+nuevoRol+' — el usuario deberá reiniciar sesión','ok');
  }

  // Actualizar nombre y contraseña
  if(SYS[u]){
    SYS[u].name=name;
    if(pass) SYS[u].pass=pass;
  } else {
    EXTRA[u].name=name;
    if(pass) EXTRA[u].pass=pass;
  }

  // Campus y tipo (para agentes y supervisores)
  if((nuevoRol||rolActual)==='agent'||(nuevoRol||rolActual)==='supervisor'){
    var campus=Array.from(document.querySelectorAll('input[name="eu-campus-chk"]:checked')).map(function(e){return e.value;});
    if(!campus.length){ notif('Selecciona al menos un campus','err'); return; }
    var zona=CAMPUS_ZONA[campus[0]]||'';

    if(!SYS[u]){
      EXTRA[u].campus=campus;
    if(u===CU.username){CU.campus=campus;CU.zona=zona;} // actualizar sesión activa
      EXTRA[u].zona=zona;
      saveEXTRA();
    } else {
      SYS[u].campus=campus;
      SYS[u].zona=zona;
    }

    var tvEl=document.getElementById('eu-tipo');
    var tv=tvEl?tvEl.value:'both';
    var tipos=tv==='I'?['I']:tv==='E'?['E']:['I','E'];
    ASGN[u]=Object.assign(ASGN[u]||{},{campus:campus,tipos:tipos});
    saveASGN();
  }

  // Notificar otras pestañas
  try{localStorage.setItem('crm_users_ts',Date.now().toString());}catch(e){}
  bcSend({type:'user_update', extra:EXTRA, asgn:ASGN});

  // Limpiar colas del agente editado (sus filtros cambiaron)
  Object.keys(window._colas||{}).forEach(function(k){
    if(k.indexOf(u+'|')===0) delete window._colas[k];
  });

  closeModal();
  notif('Usuario '+u+' actualizado','ok');
  pgUsuarios(document.getElementById('main'));
}

function delUser(u){
  if(!confirm('¿Eliminar usuario '+u+'?'))return;
  delete EXTRA[u]; saveEXTRA();
  delete ASGN[u]; saveASGN();
  try{localStorage.setItem('crm_users_ts',Date.now().toString());}catch(e){}
  notif('Usuario eliminado','ok');
  pgUsuarios(document.getElementById('main'));
}

var _pgU_pag=0;
var _pgU_debounce=null;

function filtrarUsuarios(q){
  clearTimeout(_pgU_debounce);
  _pgU_debounce=setTimeout(function(){
    var _q=(q||'').toLowerCase().trim();
    var tbody=document.getElementById('usr-tbody');
    if(!tbody) return;
    var filas=Array.from(tbody.querySelectorAll('tr[data-search]'));
    var visibles=[];
    filas.forEach(function(tr){
      var hay=!_q||tr.dataset.search.indexOf(_q)>=0;
      tr.style.display=hay?'':'none';
      if(hay) visibles.push(tr);
    });
    // Si hay búsqueda: mostrar todos los que coinciden (sin paginación)
    // Si no hay búsqueda: re-aplicar paginación
    var pag=document.getElementById('usr-pag');
    if(_q){
      if(pag) pag.style.display='none';
    } else {
      // Restaurar paginación actual
      filas.forEach(function(tr,i){
        tr.style.display=(i>=_pgU_pag*15&&i<(_pgU_pag+1)*15)?'':'none';
      });
      if(pag) pag.style.display='flex';
    }
    var resumen=document.getElementById('usr-resumen');
    if(resumen) resumen.textContent=(_q
      ?visibles.length+' resultado'+(visibles.length!==1?'s':', escribe más para filtrar')
      :filas.length+' usuarios registrados');
  },120);
}

// ══ PARSEO DE CSV ══

function parseCSV(text){
  // Normalizar saltos de línea
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines = text.split('\n').filter(function(l){return l.trim();});
  if(!lines.length) return [];
  // Detectar separador
  var sep = lines[0].indexOf(';') > lines[0].indexOf(',') ? ';' : ',';
  // Parsear cabeceras
  var headers = parseCsvLine(lines[0], sep).map(function(h){return h.trim();});
  var rows = [];
  for(var i=1; i<lines.length; i++){
    var cols = parseCsvLine(lines[i], sep);
    if(!cols.length) continue;
    var row = {};
    headers.forEach(function(h, idx){
      row[h] = (cols[idx]||'').trim();
    });
    rows.push(row);
  }
  return rows;
}

function parseCsvLineAdv(line, sep){
  sep = sep || ',';
  var result=[], cur='', inQ=false;
  for(var i=0; i<line.length; i++){
    var ch=line[i];
    if(ch==='"'){ inQ=!inQ; }
    else if(ch===sep && !inQ){ result.push(cur); cur=''; }
    else cur+=ch;
  }
  result.push(cur);
  return result.map(function(v){return v.trim().replace(/^"|"$/g,'');});
}

// Override parseCsvLine para que use el separador dinámico
var _origParseCsvLine = typeof parseCsvLine === 'function' ? parseCsvLine : null;

function mergeRows(existing, incoming, key){
  var map={};
  (existing||[]).forEach(function(r){ map[r[key]]=r; });
  var added=0, updated=0;
  (incoming||[]).forEach(function(r){
    if(!r[key]) return;
    if(map[r[key]]){
      // Actualizar datos base pero preservar tipificaciones
      Object.assign(map[r[key]], r);
      updated++;
    } else {
      map[r[key]] = r;
      added++;
    }
  });
  return {rows: Object.values(map), added: added, updated: updated};
}

function cleanName(s){
  return (s||'').replace(/\s+/g,' ').trim();
}

function safeStr(s){
  return (s||'').trim();
}

function aplicarMotor(rows){
  rows.forEach(function(r){
    // Calcular oferta de idioma
    var planConIng = PLAN_ING[r.pl]==='Si';
    if(planConIng){
      r.oi = 'Certificación';
      return;
    }
    // Buscar historial
    var hist = HIST[r.m];
    if(hist){
      r.un = hist.niv || '';
      r.ca = hist.cal || '';
      var nivNum = NIVEL_ORD[r.un] || 0;
      var calif = parseFloat(r.ca)||0;
      var maxNiv = CAMPUS_MAX[r.c] || 4;
      if(hist.niv && hist.cal){
        if(calif < 6){
          r.oi = r.un; // repetir nivel
        } else {
          var sig = nivNum + 1;
          r.oi = sig > maxNiv ? 'Certificación' : (NIVEL_NOM[String(sig)] || '');
        }
      } else {
        r.oi = ''; // activo sin calificación
      }
    } else {
      r.oi = 'INGLÉS I'; // sin historial → empezar desde I
    }
    // Calcular cursos disponibles según la carrera del prospecto
    r.cur = [];
    if(CURSOS_CAT && CURSOS_CAT.length){
      var cn = (r.p||'').toLowerCase().trim();
      // Limpiar código de carrera: 'LAE42 Administración de Empresas C' → 'administración de empresas'
      var cnLimpio = cn.replace(/^[a-z0-9]{3,8}\s+/,'').replace(/\s+[a-z]$/,'').trim();
      CURSOS_CAT.forEach(function(cat){
        var cc = (cat.carrera||'').toLowerCase().trim();
        if(!cc) return;
        // Cursos para TODAS las carreras
        if(cc === 'todas'){
          if(r.cur.indexOf(cat.curso) < 0) r.cur.push(cat.curso);
          return;
        }
        // Coincidencia por palabras clave (longitud > 4)
        var palabras = cc.split(' ').filter(function(p){return p.length > 4;});
        var match = palabras.some(function(p){
          return cnLimpio.indexOf(p) >= 0 || cn.indexOf(p) >= 0;
        }) || cc.indexOf(cnLimpio) >= 0 || cnLimpio.indexOf(cc) >= 0;
        if(match && r.cur.indexOf(cat.curso) < 0) r.cur.push(cat.curso);
      });
    }
  });
  return rows;
}

function handleCSV(e,k){
  var f=e.target.files[0]; if(!f) return;
  var st=document.getElementById('st-'+k);
  function setSt(msg,ok){
    if(!st) return;
    st.textContent=msg;
    st.style.cssText='display:block;margin-top:.5rem;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;'+(ok?'background:#E6F5EC;color:#0B8A3D;':'background:#FDEAEA;color:#CC2020;');
  }
  setSt('Procesando...', true);
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var rows=parseCSV(ev.target.result);
      if(!rows||!rows.length){setSt('Archivo vacio o formato invalido',false);return;}
      var msg='';
      if(k==='ins'){
        var nr=rows.filter(function(r){return r['Matrícula'];}).map(function(r){
          return{m:parseInt(r['Matrícula'])||0,
            n:cleanName((r['First Name']||'')+' '+(r['Apellido Paterno']||'')+' '+(r['Apellido Materno']||'')),
            c:safeStr(r['Campus Real']),p:safeStr(r['Descripción Programa Académico']),
            pl:safeStr(r['Plan']),t:safeStr(r['Celular']||r['Phone']),
            e:safeStr(r['Correo Electrónico']),mod:safeStr(r['Modalidad']),
            oi:'',un:'',ca:'',cur:[],z:'',tp:'I'};
        });
        if(!nr.length){setSt('Sin matriculas validas',false);return;}
        var mr=mergeRows(DB.ins,aplicarMotor(nr),'m');
        DB.ins=mr.rows;
        msg='+'+fmt(mr.added)+' nuevos, '+fmt(mr.updated)+' actualizados. Total: '+fmt(DB.ins.length);
      } else {
        var nr=rows.filter(function(r){return r['Campus Real']&&r['Campus Real']!=='#N/D'&&r['Matrícula'];}).map(function(r){
          return{m:parseInt(r['Matrícula'])||0,n:cleanName(r['Nombre del Alumno']||''),
            c:safeStr(r['Campus Real']),p:safeStr(r['Programa']),pl:safeStr(r['Plan']),
            t:safeStr(r['Telefono']),e:safeStr(r['Mail']),mod:safeStr(r['Modalidad']),
            oi:'',un:'',ca:'',cur:[],z:'',tp:'E'};
        });
        if(!nr.length){setSt('Sin campus validos',false);return;}
        var mr=mergeRows(DB.egr,aplicarMotor(nr),'m');
        DB.egr=mr.rows;
        msg='+'+fmt(mr.added)+' nuevos, '+fmt(mr.updated)+' actualizados. Total: '+fmt(DB.egr.length);
      }
      setSt('OK '+msg, true);
      refreshState(); notif(msg,'ok');

      // ── Validar PS contra nueva base ──
      var _allMats=new Set(all().map(function(r){return r.m;}));
      var _psHuerfano=Object.keys(PS).filter(function(m){return !_allMats.has(parseInt(m));});
      var _ofertaCambiada=0;
      all().forEach(function(r){
        var psR=PS[r.m]||{};
        Object.keys(psR).forEach(function(prod){
          // Si el producto gestionado ya no corresponde a la oferta actual del prospecto
          var esIdioma=NIVEL_ORD[prod]!==undefined||prod==='Certificación';
          var ofertaActual=r.oi;
          // Si tenía cerrado_ganado en un idioma que ya no es su oferta → alertar
          if(esIdioma&&psR[prod].estado==='cerrado_ganado'&&ofertaActual&&ofertaActual!==prod){
            _ofertaCambiada++;
          }
        });
      });

      // Construir resumen de impacto
      var _impacto=[];
      if(mr.added>0)   _impacto.push(fmt(mr.added)+' prospectos nuevos (sin tipificación)');
      if(mr.updated>0) _impacto.push(fmt(mr.updated)+' actualizados (tipificaciones conservadas)');
      if(_psHuerfano.length) _impacto.push(_psHuerfano.length+' tipificaciones huérfanas (mat ya no existe en base)');
      if(_ofertaCambiada>0)  _impacto.push(_ofertaCambiada+' prospectos con oferta diferente a su venta cerrada');

      // Si hay huérfanos, ofrecer limpieza
      if(_psHuerfano.length){
        var cleanBtn='<button onclick="(function(){'
          +'var n='+JSON.stringify(_psHuerfano)+';'
          +'n.forEach(function(m){delete PS[m];});'
          +'psSync();'
          +'notif(n.length+\' tipificaciones huérfanas eliminadas\',\'ok\');'
          +'closeModal();'
          +'})()" style="margin-top:.5rem;padding:6px 14px;border-radius:8px;border:1px solid var(--rd);'
          +'background:rgba(255,51,85,.1);color:var(--rd);font-size:11px;cursor:pointer;font-weight:700">'
          +'🧹 Limpiar tipificaciones huérfanas</button>';
        var keepBtn='<button onclick="closeModal()" style="margin-top:.5rem;margin-left:.5rem;padding:6px 14px;'
          +'border-radius:8px;border:1px solid var(--border);background:transparent;'
          +'color:var(--tx2);font-size:11px;cursor:pointer">Conservar</button>';
        setTimeout(function(){
          openModal('📋 Resumen de carga',
            '<div style="font-size:12px;color:var(--tx);line-height:2">'
            +_impacto.map(function(i){return '• '+i;}).join('<br>')
            +'</div>'
            +'<div style="margin-top:1rem;padding:.75rem;background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.2);border-radius:8px">'
              +'<div style="font-size:11px;color:var(--rd);font-weight:700;margin-bottom:.25rem">⚠ Tipificaciones huérfanas</div>'
              +'<div style="font-size:11px;color:var(--tx2)">Existen '+_psHuerfano.length+' matrículas con tipificación que ya no están en la base. ¿Deseas eliminarlas?</div>'
              +cleanBtn+keepBtn
            +'</div>'
          );
        },300);
      } else if(_impacto.length){
        setTimeout(function(){
          openModal('📋 Resumen de carga',
            '<div style="font-size:12px;color:var(--tx);line-height:2">'
            +_impacto.map(function(i){return '• '+i;}).join('<br>')
            +'</div>'
            +((_ofertaCambiada>0)
              ?'<div style="margin-top:.75rem;font-size:11px;color:var(--o1)">⚠ '+_ofertaCambiada+' prospectos tienen oferta diferente a su venta cerrada — revisar manualmente</div>'
              :'')
            +'<div style="margin-top:1rem;text-align:right">'
              +'<button onclick="closeModal()" class="bpri" style="font-size:12px">Entendido</button>'
            +'</div>'
          );
        },300);
      }

      // 1. BroadcastChannel — notificación inmediata
      bcSend({type:'db_update', ins:DB.ins, egr:DB.egr});
      // 2. localStorage
      try{
        var ts=Date.now();
        localStorage.setItem('crm_db_ts', ts.toString());
        try{
          localStorage.setItem('crm_db', JSON.stringify({ins:DB.ins,egr:DB.egr,ts:ts}));
        }catch(sizeErr){
          console.warn('[CRM] DB demasiado grande para localStorage');
          localStorage.setItem('crm_db_size_err','1');
        }
      }catch(e){}
      if(CU&&CU.role==='agent') setTimeout(function(){goPage('mi-base');},300);
      else setTimeout(function(){pgCatalogos(document.getElementById('main'));},150);
    }catch(err){setSt('Error: '+err.message, false);notif('Error al procesar','err');console.error(err);}
  };
  reader.readAsText(f,'UTF-8'); e.target.value='';
}

function csvHistorial(event){
  // Reutiliza cargarHistCSV si existe, sino implementa aquí
  if(typeof cargarHistCSV==='function'){cargarHistCSV(event);return;}
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n').filter(function(l){return l.trim();});
    var nuevo={}; var hdr=parseCsvLine(lines[0]);
    var iMat=hdr.findIndex(function(h){return /matr|id.alu|matricula/i.test(h);});
    var iCal=hdr.findIndex(function(h){return /calif|calif|nota|grade/i.test(h);});
    var iNiv=hdr.findIndex(function(h){return /nivel|level|curso/i.test(h);});
    if(iMat<0){notif('No se encontró columna de matrícula en el CSV','err');return;}
    lines.slice(1).forEach(function(line){
      var cols=parseCsvLine(line);
      var mat=parseInt((cols[iMat]||'').trim());
      if(!mat) return;
      var cal=iCal>=0?(cols[iCal]||'').trim():'';
      var niv=iNiv>=0?(cols[iNiv]||'').trim():'';
      nuevo[mat]={cal:cal,niv:niv};
    });
    var n=Object.keys(nuevo).length;
    if(!n){notif('Sin datos válidos de historial en el CSV','err');return;}
    Object.assign(HIST,nuevo);
    try{localStorage.setItem('crm_hist',JSON.stringify(HIST));}catch(ex){}
    notif('&#x2713; Historial actualizado: '+n+' registros','ok');
    pgCatEditor(document.getElementById('main'));
  };
  reader.readAsText(file,'UTF-8');
}

// Helper: parsear línea CSV respetando comillas
function parseCsvLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur);cur='';}
    else cur+=ch;
  }
  result.push(cur);
  return result;
}

function cargarHistCSV(e){
  var f=e.target.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      // CSV real de Aliat:
      // Col 10 (ID) = Matrícula
      // Col 18 (Entrd Calif) = Nombre del nivel: INGLÉS I, II...
      // Col 19 (Nº Nota) = Calificación numérica
      var NIVEL_ORD_H={"INGLÉS I":1,"INGLÉS II":2,"INGLÉS III":3,"INGLÉS IV":4,
                       "INGLÉS V":5,"INGLÉS VI":6,"INGLÉS VII":7,"INGLÉS VIII":8,"INGLÉS IX":9};
      var lines=ev.target.result.split('\n').filter(function(l){return l.trim();});
      var tmp={};
      lines.slice(1).forEach(function(line){
        var cols=parseCsvLine(line);
        if(cols.length<20) return;
        var matStr=(cols[10]||'').trim();
        if(!matStr||isNaN(parseInt(matStr))) return;
        var mat=parseInt(matStr);
        var niv=(cols[18]||'').trim();           // Nombre del nivel
        var nota=(cols[19]||'').trim();           // Calificación numérica
        if(!NIVEL_ORD_H[niv]) return;
        var nn=NIVEL_ORD_H[niv];
        var cn=nota===''?null:parseFloat(nota);
        var est=cn===null?'activo':cn>=6?'aprobado':'reprobado';
        // Tomar el nivel más alto con calificación
        if(!tmp[mat]||nn>tmp[mat].nn||(nn===tmp[mat].nn&&nota&&!tmp[mat].cal)){
          tmp[mat]={niv:niv,nn:nn,cal:nota,est:est};
        }
      });
      var n=Object.keys(tmp).length;
      if(!n){notif('Sin datos válidos — verifica que el CSV tenga el formato correcto','err');return;}
      Object.keys(tmp).forEach(function(id){
        var v=tmp[id];
        if(!HIST[id]||v.nn>=(HIST[id].nn||0)) HIST[id]={niv:v.niv,cal:v.cal,est:v.est};
      });
      try{localStorage.setItem('crm_hist',JSON.stringify(HIST));}catch(ex){}
      // Recalcular oferta en toda la base
      if(DB.ins.length) DB.ins=aplicarMotor(DB.ins);
      if(DB.egr.length) DB.egr=aplicarMotor(DB.egr);
      notif('✓ Historial actualizado: '+fmt(n)+' registros','ok');
      e.target.value='';
      pgCatEditor(document.getElementById('main'));
    }catch(err){notif('Error: '+err.message,'err');}
  };
  reader.readAsText(f,'UTF-8');
}

function _chatBeep(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(660,ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

function _notifChat(msg){
  if(!msg||msg.para!==CU.username) return;
  // Si el chat está abierto con el remitente, renderizar y beep suave
  if(_chatConUser===msg.de){
    _renderChat();
    _chatBeep();
    return;
  }
  // Si no, mostrar notificación + beep + vibración (móvil)
  _chatBeep();
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  var ud=allU()[msg.de]||{name:msg.de};
  var notifEl=document.getElementById('chat-notif');
  var txt=document.getElementById('chat-notif-txt');
  if(notifEl&&txt){
    txt.textContent=ud.name+': '+msg.msg.substring(0,30)+(msg.msg.length>30?'…':'');
    _chatConUser=msg.de;
    notifEl.style.display='block';
    // Animación pulso
    notifEl.style.animation='none';
    notifEl.offsetHeight; // reflow
    notifEl.style.animation='chatPulse 0.5s ease 2';
    setTimeout(function(){if(notifEl)notifEl.style.display='none';},10000);
  }
  // Actualizar ícono del botón de chat con badge (para todos los roles)
  var btnChatB=document.getElementById('btn-chat-sup');
  var lbl=CU.role==='agent'?'💬 Supervisor':'💬 Chat';
  if(btnChatB&&document.getElementById('chat-widget').style.display==='none'){
    btnChatB.innerHTML=lbl+' <span style="background:var(--rd);color:#fff;border-radius:50%;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-left:4px;padding:0 3px">!</span>';
  }
}

// Admin abre panel de chat — puede elegir con quién chatear
function abrirChatAdmin(){
  // Mostrar lista de usuarios activos para chatear
  var users=Object.entries(allU()).filter(function(e){
    return e[0]!==CU.username&&e[1].role!=='admin';
  });
  if(!users.length){notif('No hay usuarios disponibles para chatear','err');return;}
  
  // Si hay un solo usuario, abrir directamente
  if(users.length===1){abrirChatCon(users[0][0]);return;}

  // Mostrar selector de destinatario en el widget de chat
  var titulo=document.getElementById('chat-title');
  var msgs=document.getElementById('chat-msgs');
  var widget=document.getElementById('chat-widget');
  if(!widget) return;
  widget.style.display='block';
  if(titulo) titulo.textContent='Chat';

  var lista=users.map(function(e){
    var u=e[0],ud=e[1];
    var rolLbl=ud.role==='supervisor'?'Supervisor':'Agente';
    var nMsg=CHAT_MSG.filter(function(m){return m.de===u&&m.para===CU.username&&!m.leido;}).length;
    return '<div onclick="abrirChatCon(\''+u+'\')" '
      +'style="display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;cursor:pointer;border-radius:8px;transition:background .15s" '
      +'onmouseover="this.style.background=\'rgba(78,173,243,.08)\'" '
      +'onmouseout="this.style.background=\'transparent\'">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">'+ud.name.charAt(0)+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:12px;font-weight:600;color:var(--tx)">'+ud.name+'</div>'
        +'<div style="font-size:10px;color:var(--tx3)">'+rolLbl+'</div>'
      +'</div>'
      +(nMsg>0?'<span style="background:var(--rd);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">'+nMsg+'</span>':'')
      +'</div>';
  }).join('');

  if(msgs) msgs.innerHTML='<div style="padding:.5rem">'
    +'<div style="font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;padding:0 .25rem">Selecciona un destinatario</div>'
    +lista+'</div>';
  
  // Ocultar input de mensaje mientras está en selector
  var inputArea=widget.querySelector('div:last-child');
  if(inputArea) inputArea.style.display='none';
}

// Agente abre chat con su supervisor
function abrirChatSupervisor(){
  // Buscar supervisor en grupos
  var miGrupo=Object.values(GRUPOS).find(function(g){
    return g.agentes&&g.agentes.indexOf(CU.username)>=0&&g.supervisor;
  });
  if(miGrupo&&miGrupo.supervisor){
    abrirChatCon(miGrupo.supervisor);
    return;
  }
  // Sin grupo asignado — abrir chat genérico para chatear con admin
  var admins=Object.entries(allU()).filter(function(e){return e[1].role==='admin';});
  if(admins.length){
    // Chatear con el primer admin disponible
    abrirChatCon(admins[0][0]);
    notif('Sin supervisor asignado — chateando con administrador','ok');
    return;
  }
  notif('No tienes supervisor ni administrador asignado','err');
}

</script>

    <div>
      <div style="font-size:13px;font-weight:700;color:#fff" id="chat-title">Chat</div>
      <div style="font-size:10px;color:rgba(255,255,255,.6)" id="chat-sub"></div>
    </div>
    <button onclick="cerrarChat()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px">×</button>
  </div>
  <div id="chat-msgs" style="height:260px;overflow-y:auto;background:rgba(8,12,20,.97);padding:.75rem;display:flex;flex-direction:column;gap:.4rem"></div>

      style="flex:1;padding:8px 10px;background:rgba(78,173,243,.06);border:1px solid rgba(78,173,243,.2);border-radius:8px;color:var(--tx);font-size:12px;outline:none"
      onkeydown="if(event.key==='Enter')enviarMsgChat()">

</div>
<!-- Notificación de chat -->
<div id="chat-notif" style="display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:7999;background:var(--c2);color:#fff;border-radius:12px;padding:.6rem 1rem;font-size:12px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4)" onclick="abrirChatCon(_chatConUser)">

</div>
